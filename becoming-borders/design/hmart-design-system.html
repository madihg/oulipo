    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        const loading = document.getElementById("__bundler_loading");
        function setStatus(msg) {
          if (loading) loading.textContent = msg;
        }

        // Error sink persists across replaceWith since it's on window, not the DOM.
        window.addEventListener(
          "error",
          function (e) {
            var p = document.body || document.documentElement;
            var d =
              document.getElementById("__bundler_err") ||
              p.appendChild(document.createElement("div"));
            d.id = "__bundler_err";
            d.style.cssText =
              "position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto";
            d.textContent =
              (d.textContent ? d.textContent + String.fromCharCode(10) : "") +
              "[bundle] " +
              (e.message || e.type) +
              (e.filename
                ? " (" + e.filename.slice(0, 60) + ":" + e.lineno + ")"
                : "");
          },
          true,
        );

        try {
          const manifestEl = document.querySelector(
            'script[type="__bundler/manifest"]',
          );
          const templateEl = document.querySelector(
            'script[type="__bundler/template"]',
          );
          if (!manifestEl || !templateEl) {
            setStatus("Error: missing bundle data");
            console.error(
              "[bundler] Missing script tags — manifestEl:",
              !!manifestEl,
              "templateEl:",
              !!templateEl,
            );
            return;
          }

          const manifest = JSON.parse(manifestEl.textContent);
          let template = JSON.parse(templateEl.textContent);

          const uuids = Object.keys(manifest);
          setStatus("Unpacking " + uuids.length + " assets...");

          const blobUrls = {};
          await Promise.all(
            uuids.map(async (uuid) => {
              const entry = manifest[uuid];
              try {
                const binaryStr = atob(entry.data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++)
                  bytes[i] = binaryStr.charCodeAt(i);

                let finalBytes = bytes;
                if (entry.compressed) {
                  if (typeof DecompressionStream !== "undefined") {
                    const ds = new DecompressionStream("gzip");
                    const writer = ds.writable.getWriter();
                    const reader = ds.readable.getReader();
                    writer.write(bytes);
                    writer.close();
                    const chunks = [];
                    let totalLen = 0;
                    while (true) {
                      const { done, value } = await reader.read();
                      if (done) break;
                      chunks.push(value);
                      totalLen += value.length;
                    }
                    finalBytes = new Uint8Array(totalLen);
                    let offset = 0;
                    for (const chunk of chunks) {
                      finalBytes.set(chunk, offset);
                      offset += chunk.length;
                    }
                  } else {
                    console.warn(
                      "DecompressionStream not available, asset " +
                        uuid +
                        " may not render",
                    );
                  }
                }

                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([finalBytes], { type: entry.mime }),
                );
              } catch (err) {
                console.error("Failed to decode asset " + uuid + ":", err);
                blobUrls[uuid] = URL.createObjectURL(
                  new Blob([], { type: entry.mime }),
                );
              }
            }),
          );

          const extResEl = document.querySelector(
            'script[type="__bundler/ext_resources"]',
          );
          const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
          const resourceMap = {};
          for (const entry of extResources) {
            if (blobUrls[entry.uuid])
              resourceMap[entry.id] = blobUrls[entry.uuid];
          }

          setStatus("Rendering...");
          for (const uuid of uuids)
            template = template.split(uuid).join(blobUrls[uuid]);

          // Strip integrity + crossorigin — blob URLs from a file:// document inherit
          // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
          // The manifest bytes are ours; SRI protects against CDN compromise, not this.
          template = template
            .replace(/\s+integrity="[^"]*"/gi, "")
            .replace(/\s+crossorigin="[^"]*"/gi, "");

          const resourceScript =
            "<script>window.__resources = " +
            JSON.stringify(resourceMap)
              .split("</" + "script>")
              .join("<\\/" + "script>") +
            ";</" +
            "script>";
          // Inject after <head> so the DOCTYPE stays first; prepending the script
          // would push the parser into quirks mode. DOMParser always emits a <head>
          // (synthesizing one if the source HTML omitted it) but may carry
          // attributes through, so match the full opening tag. slice() rather than
          // replace() keeps us clear of $-pattern substitution in resourceScript.
          const headOpen = template.match(/<head[^>]*>/i);
          if (headOpen) {
            const i = headOpen.index + headOpen[0].length;
            template =
              template.slice(0, i) + resourceScript + template.slice(i);
          }

          // Parse the template and swap the root element. Scripts inserted via
          // DOMParser/replaceWith are inert per spec — re-create each with
          // createElement so they execute, awaiting onload for src scripts to
          // preserve ordering (React before ReactDOM before Babel before text/babel).
          const doc = new DOMParser().parseFromString(template, "text/html");
          document.documentElement.replaceWith(doc.documentElement);
          const dead = Array.from(document.scripts);
          for (const old of dead) {
            const s = document.createElement("script");
            for (const a of old.attributes) s.setAttribute(a.name, a.value);
            s.textContent = old.textContent;
            // text/babel scripts with a src: fetch and inline. transformScriptTags
            // does XHR against the src, but blob:null/ from a file:// origin is
            // silently dropped. Inlining makes it a plain inline babel script,
            // which transformScriptTags handles unconditionally.
            if ((s.type === "text/babel" || s.type === "text/jsx") && s.src) {
              const r = await fetch(s.src);
              s.textContent = await r.text();
              s.removeAttribute("src");
            }
            const p = s.src
              ? new Promise(function (r) {
                  s.onload = s.onerror = r;
                })
              : null;
            old.replaceWith(s);
            if (p) await p;
          }
          // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
          // which fired before we swapped the document. Trigger manually if present.
          if (
            window.Babel &&
            typeof window.Babel.transformScriptTags === "function"
          ) {
            window.Babel.transformScriptTags();
          }
        } catch (err) {
          setStatus("Error unpacking: " + err.message);
          console.error("Bundle unpack error:", err);
        }
      });
    </script>

cal-align: middle;\n  }\n  .perf-table th {\n    font-weight: 400;\n    font-size: 0.78rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    color: var(--text-tertiary);\n    border-top: 0;\n    border-bottom: 1px solid var(--border);\n  }\n  .perf-table .chip-cell {\n    width: 4rem;\n  }\n  .perf-table .chip-inline {\n    display: block;\n    width: 2.5rem;\n    height: 2.5rem;\n    border: 1px solid var(--border-light);\n  }\n  .perf-table .name { color: var(--text-primary); }\n  .perf-table .accessible {\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n  }\n\n  /* type spec cards */\n  .type-spec {\n    border-top: 1px solid var(--border-light);\n    padding: var(--s-5) 0;\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: var(--s-6);\n    align-items: start;\n  }\n  @media (max-width: 768px) { .type-spec { grid-template-columns: 1fr; } }\n  .type-spec .label {\n    font-family: var(--font-mono);\n    font-size: 0.78rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    color: var(--text-tertiary);\n    margin-bottom: var(--s-2);\n  }\n  .type-spec .role {\n    font-family: var(--font-title);\n    font-size: 1.4rem;\n    font-weight: 600;\n    margin: 0 0 var(--s-2);\n    letter-spacing: -0.005em;\n  }\n  .type-spec .sub {\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--text-secondary);\n    margin-bottom: var(--s-3);\n    line-height: 1.5;\n  }\n  .type-spec .specs {\n    font-family: var(--font-mono);\n    font-size: 0.82rem;\n    color: var(--text-tertiary);\n    line-height: 1.7;\n    text-transform: uppercase;\n    letter-spacing: 0.04em;\n  }\n  .type-spec .specs span { display: block; }\n  .type-spec .specs b { font-weight: 700; color: var(--text-primary); }\n  .type-spec .preview { padding: var(--s-3) 0; min-height: 8rem; }\n\n  .preview-display {\n    font-family: var(--font-display);\n    font-size: clamp(2.5rem, 7vw, 5rem);\n    line-height: 0.9;\n    color: var(--text-primary);\n  }\n  .preview-body {\n    font-family: var(--font-body);\n    font-size: 1.06rem;\n    line-height: 1.2;\n    color: var(--text-primary);\n    max-width: 32ch;\n  }\n  .preview-body.bold { font-weight: 700; }\n  .preview-title {\n    font-family: var(--font-title);\n    font-size: 2rem;\n    font-weight: 700;\n    line-height: 1.1;\n    letter-spacing: -0.01em;\n  }\n  .preview-mono {\n    font-family: var(--font-mono);\n    font-size: 0.92rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    color: var(--text-primary);\n    line-height: 1.7;\n  }\n\n  /* spacing scale viz */\n  .spacing-scale { display: grid; grid-template-columns: 6rem 1fr 6rem; gap: var(--s-4); align-items: center; font-family: var(--font-mono); font-size: 0.85rem; }\n  .spacing-row { display: contents; }\n  .spacing-row .name { color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; font-size: 0.78rem; }\n  .spacing-row .bar { height: 8px; background: var(--text-primary); }\n  .spacing-row .val { color: var(--text-tertiary); text-align: right; font-size: 0.78rem; }\n\n  /* status pills */\n  .pill {\n    display: inline-flex;\n    align-items: center;\n    font-family: var(--font-mono);\n    font-size: 0.7rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    padding: 0.25rem 0.7rem;\n    border-radius: 2px;\n    border: 1px solid transparent;\n    line-height: 1.4;\n  }\n  .pill.upcoming { background: #f3f4f6; border-color: #d1d5db; color: #4b5563; }\n  .pill.training { background: #ffffff; border-color: #171717; color: #171717; }\n  .pill.trained  { background: #171717; border-color: #171717; color: #ffffff; }\n\n  /* -------- COMPONENT GALLERY -------- */\n  .gallery {\n    display: grid;\n    grid-template-columns: repeat(2, 1fr);\n    gap: var(--s-6);\n    margin: var(--s-5) 0;\n  }\n  @media (max-width: 900px) { .gallery { grid-template-columns: 1fr; } }\n  .specimen {\n    border-top: 1px solid var(--border-light);\n    padding-top: var(--s-4);\n  }\n  .specimen .label {\n    font-family: var(--font-mono);\n    font-size: 0.78rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    color: var(--text-tertiary);\n    margin-bottom: var(--s-4);\n    display: flex;\n    justify-content: space-between;\n    gap: var(--s-3);\n  }\n  .specimen .label .right { color: var(--text-hint); }\n\n  /* nav link */\n  .nav-link {\n    display: inline-block;\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    padding: 0.5rem 1rem;\n    border: 1px solid rgba(0,0,0,0.15);\n    border-radius: 6px;\n    color: var(--text-primary);\n    text-decoration: none;\n    transition: border-color .2s ease, opacity .3s ease;\n  }\n  .nav-link:hover { opacity: 0.7; border-color: rgba(0,0,0,0.4); }\n\n  /* submit button */\n  .submit-btn {\n    display: inline-block;\n    font-family: var(--font-body);\n    font-size: 1rem;\n    font-weight: 700;\n    color: #fff;\n    background: var(--btn-color, var(--hard));\n    padding: 0.75rem 2rem;\n    border: 0;\n    border-radius: 0;\n    cursor: pointer;\n    transition: opacity .3s ease;\n  }\n  .submit-btn:hover { opacity: 0.7; }\n\n  /* performance card */\n  .perf-card {\n    --acc: var(--hard);\n    border-top: 4px solid var(--acc);\n    padding-top: var(--s-4);\n    cursor: var(--dot-cursor, pointer);\n  }\n  .perf-card .img {\n    aspect-ratio: 16 / 9;\n    background: var(--img-bg, #ddd);\n    background-size: cover;\n    background-position: center;\n    filter: grayscale(100%);\n    transition: filter 0.5s ease;\n    margin-bottom: var(--s-4);\n  }\n  .perf-card:hover .img { filter: grayscale(0%); }\n  .perf-card .title {\n    font-family: var(--font-title);\n    font-size: 1.1rem;\n    font-weight: 500;\n    margin: 0 0 var(--s-2);\n    color: var(--text-primary);\n  }\n  .perf-card .meta {\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--text-tertiary);\n    text-transform: uppercase;\n    letter-spacing: 0.04em;\n    line-height: 1.6;\n  }\n\n  /* poem card / voteable */\n  .poem-set { display: grid; grid-template-columns: 1fr; gap: 0; }\n  .poem {\n    --acc: var(--hard);\n    padding: var(--s-5) 0;\n    border-top: 2px solid var(--border-light);\n    cursor: var(--dot-cursor, pointer);\n    transition: opacity 0.3s ease, border-color 0.3s ease;\n    white-space: pre-line;\n    font-family: var(--font-body);\n    font-size: 0.95rem;\n    line-height: 1.7;\n    color: var(--text-primary);\n  }\n  .poem-set:hover .poem:not(:hover) { opacity: 0.5; }\n  .poem.selected { border-top-color: var(--acc); }\n  .poem-set.has-selected .poem:not(.selected) { opacity: 0.5; }\n\n  /* focus ring demo */\n  .focus-demo {\n    display: inline-block;\n    font-family: var(--font-mono);\n    font-size: 0.92rem;\n    padding: 0.5rem 1rem;\n    border: 1px solid var(--border);\n    background: #fff;\n    color: var(--text-primary);\n    margin-right: var(--s-3);\n    margin-bottom: var(--s-3);\n    cursor: pointer;\n  }\n  .focus-demo:focus {\n    outline: 3px solid var(--focus-color, var(--hard));\n    outline-offset: 2px;\n  }\n\n  /* ---------- ANTI-PATTERNS ---------- */\n  .anti {\n    display: grid;\n    grid-template-columns: repeat(3, 1fr);\n    gap: var(--s-5);\n    margin: var(--s-5) 0;\n  }\n  @media (max-width: 900px) { .anti { grid-template-columns: 1fr; } }\n  .anti .card { padding: var(--s-4); border-top: 1px solid var(--border-light); }\n  .anti .label {\n    font-family: var(--font-mono);\n    font-size: 0.78rem;\n    text-transform: uppercase;\n    letter-spacing: 0.05em;\n    color: var(--text-tertiary);\n    margin-bottom: var(--s-3);\n  }\n  .anti .x {\n    font-family: var(--font-mono);\n    font-size: 0.78rem;\n    color: var(--text-primary);\n    margin-bottom: var(--s-2);\n  }\n  .anti .x::before { content: \"× \"; color: var(--text-primary); }\n  .anti .ok::before { content: \"✓ \"; }\n\n  /* the bad demos use intentionally-wrong styles, scoped */\n  .bad-card {\n    background: linear-gradient(135deg, #f5f5f5, #e8e8e8);\n    border-radius: 16px;\n    box-shadow: 0 8px 24px rgba(0,0,0,0.12);\n    padding: 1.5rem;\n    color: #4b5563;\n  }\n  .bad-card .t { font-family: var(--font-body); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }\n  .bad-card .s { font-size: 0.9rem; }\n\n  /* ---------- footer ---------- */\n  footer {\n    border-top: 1px solid var(--border-light);\n    margin-top: var(--s-8);\n    padding-top: var(--s-5);\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--text-tertiary);\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: var(--s-5);\n  }\n\n  /* utility */\n  .hr-heavy { border: 0; border-top: 4px solid var(--border); margin: var(--s-6) 0; }\n  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-6); }\n  @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }\n\n  .callout {\n    font-family: var(--font-mono);\n    font-size: 0.85rem;\n    color: var(--text-secondary);\n    line-height: 1.6;\n    background: transparent;\n    border-top: 1px solid var(--border-light);\n    border-bottom: 1px solid var(--border-light);\n    padding: var(--s-4) 0;\n    margin: var(--s-5) 0;\n    max-width: 70ch;\n  }\n  .callout b { color: var(--text-primary); font-weight: 700; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<main class=\"page\">\n\n  <!-- ===================== HEAD ===================== -->\n  <header class=\"doc-head\">\n    <h1 class=\"wordmark\">singulars / oulipo<\u002Fh1>\n    <div class=\"meta\">\n      design system v1<br>\n      reference document<br>\n      april 2026\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <p class=\"doc-sub\">\n    a kitchen laboratory of experimental computational poetry. non-human poets,\n    anti-gravitational word interfaces, somatic semantics. this document collects\n    the rules that hold the chrome together so the work in front of it can\n    breathe.\n  <\u002Fp>\n\n  <!-- toc -->\n  <nav class=\"toc\" aria-label=\"Table of contents\">\n    <a href=\"#principles\"><span class=\"num\">01<\u002Fspan> principles<\u002Fa>\n    <a href=\"#voice\"><span class=\"num\">02<\u002Fspan> voice<\u002Fa>\n    <a href=\"#color\"><span class=\"num\">03<\u002Fspan> color<\u002Fa>\n    <a href=\"#type\"><span class=\"num\">04<\u002Fspan> typography<\u002Fa>\n    <a href=\"#layout\"><span class=\"num\">05<\u002Fspan> layout<\u002Fa>\n    <a href=\"#components\"><span class=\"num\">06<\u002Fspan> components<\u002Fa>\n    <a href=\"#interactions\"><span class=\"num\">07<\u002Fspan> interactions<\u002Fa>\n    <a href=\"#accessibility\"><span class=\"num\">08<\u002Fspan> accessibility<\u002Fa>\n    <a href=\"#anti\"><span class=\"num\">09<\u002Fspan> anti-patterns<\u002Fa>\n    <a href=\"#examples\"><span class=\"num\">10<\u002Fspan> examples<\u002Fa>\n  <\u002Fnav>\n\n  <!-- ===================== 01 PRINCIPLES ===================== -->\n  <section id=\"principles\">\n    <div class=\"sec-head\">\n      <div class=\"num\">01<\u002Fdiv>\n      <div>\n        <h2>principles<\u002Fh2>\n        <p>seven rules that distinguish this system from a generic editorial site. if a design choice doesn't trace back to one of these, it probably doesn't belong.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <dl class=\"principles\">\n      <div>\n        <dt>01 / hierarchy through opacity<\u002Fdt>\n        <dd>black on white, stepped down by opacity.<\u002Fdd>\n        <p class=\"why\">no off-whites, no tinted grays, no shadows. five levels of black-alpha do all the heavy lifting that color usually does.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>02 / color is identity, not chrome<\u002Fdt>\n        <dd>accent color belongs to a performance. it never paints the page.<\u002Fdd>\n        <p class=\"why\">the five accents are functional moments - top border, status pill, focus ring, button, cursor. white is the only background.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>03 / type carries the voice<\u002Fdt>\n        <dd>distressed display + swiss variable sans + mono captions.<\u002Fdd>\n        <p class=\"why\">the contrast between a humanist face and a clean variable family is the signature move. one display moment per page, used big.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>04 / white space replaces ornament<\u002Fdt>\n        <dd>negative space is the decoration.<\u002Fdd>\n        <p class=\"why\">a tighter reading column, generous vertical rhythm, hairline rules. nothing else needs to assert presence.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>05 / interactions are short, opacity-led<\u002Fdt>\n        <dd>hover drops to 0.7. selection drops siblings to 0.5.<\u002Fdd>\n        <p class=\"why\">no bouncing, no sliding. the language is opacity and grayscale-to-color, both 0.3 - 0.5s.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>06 / poetry is the content the chrome serves<\u002Fdt>\n        <dd>poem text uses pre-line. line breaks and stanzas are sacred.<\u002Fdd>\n        <p class=\"why\">never reflow whitespace inside a poem. voting is blind during training - no labels reveal author.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <dt>07 / a print catalogue, not a marketing site<\u002Fdt>\n        <dd>reads like a zine. lower-case wordmark, hyphens not em dashes, no emoji.<\u002Fdd>\n        <p class=\"why\">declarative copy, comma-separated taxonomies, first-person where it appears. visual ornament is replaced with white space.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdl>\n  <\u002Fsection>\n\n  <!-- ===================== 02 VOICE ===================== -->\n  <section id=\"voice\">\n    <div class=\"sec-head\">\n      <div class=\"num\">02<\u002Fdiv>\n      <div>\n        <h2>voice<\u002Fh2>\n        <p>direct, image-led, anti-marketing. how copy reads matters as much as how the chrome looks.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"grid-2\">\n      <div>\n        <h4>do<\u002Fh4>\n        <ul>\n          <li>lower-case wordmarks (<i>singulars<\u002Fi>, not <i>Singulars<\u002Fi>)<\u002Fli>\n          <li>declarative sentences. short. image-led.<\u002Fli>\n          <li>comma-separated taxonomies (<i>non-human poets, anti-gravitational word interfaces, somatic semantics<\u002Fi>)<\u002Fli>\n          <li>first-person where it appears<\u002Fli>\n          <li>hyphens with spaces ( - ) for parentheticals<\u002Fli>\n          <li>\"kitchen laboratory\" framing - humble, tactile, hand-made<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h4>don't<\u002Fh4>\n        <ul>\n          <li>no em dashes, ever<\u002Fli>\n          <li>no emojis<\u002Fli>\n          <li>no marketing puffery (\"revolutionary\", \"seamless\", \"delightful\")<\u002Fli>\n          <li>no clever icon set - the only glyph is <span style=\"font-family:var(--font-mono)\">↗<\u002Fspan><\u002Fli>\n          <li>no title case in chrome<\u002Fli>\n          <li>no exclamation points<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <blockquote>\n      a kitchen laboratory of experimental computational poetry by halim madi.\n      non-human poets, anti-gravitational word interfaces, somatic semantics.\n      this is where i break and mend things.\n    <\u002Fblockquote>\n  <\u002Fsection>\n\n  <!-- ===================== 03 COLOR ===================== -->\n  <section id=\"color\">\n    <div class=\"sec-head\">\n      <div class=\"num\">03<\u002Fdiv>\n      <div>\n        <h2>color<\u002Fh2>\n        <p>two layers. a neutral palette shared with oulipo.xyz. five performance accents that singulars adds on top, used functionally only.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>neutral palette<\u002Fh3>\n    <p>the entire chrome runs on these. white background, black-alpha hierarchy. nothing else.<\u002Fp>\n\n    <div class=\"swatch-grid\">\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background:#ffffff; border-color: var(--border-light);\"><\u002Fdiv>\n        <div class=\"name\">background<\u002Fdiv>\n        <div class=\"val\">#ffffff<\u002Fdiv>\n        <div class=\"role\">page only<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.85);\"><\u002Fdiv>\n        <div class=\"name\">text-primary<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.85)<\u002Fdiv>\n        <div class=\"role\">body copy<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.70);\"><\u002Fdiv>\n        <div class=\"name\">text-hover<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.70)<\u002Fdiv>\n        <div class=\"role\">link hover, secondary<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.60);\"><\u002Fdiv>\n        <div class=\"name\">text-secondary<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.60)<\u002Fdiv>\n        <div class=\"role\">subtitles, mono captions<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.50);\"><\u002Fdiv>\n        <div class=\"name\">text-tertiary<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.50)<\u002Fdiv>\n        <div class=\"role\">meta, dates<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.40);\"><\u002Fdiv>\n        <div class=\"name\">text-hint<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.40)<\u002Fdiv>\n        <div class=\"role\">faintest meta<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.75);\"><\u002Fdiv>\n        <div class=\"name\">border<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.75)<\u002Fdiv>\n        <div class=\"role\">heavy rules<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"swatch\">\n        <div class=\"chip\" style=\"background: rgba(0,0,0,0.12);\"><\u002Fdiv>\n        <div class=\"name\">border-light<\u002Fdiv>\n        <div class=\"val\">rgba(0,0,0,.12)<\u002Fdiv>\n        <div class=\"role\">hairlines, blockquote bars<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h4>opacity ladder, in context<\u002Fh4>\n    <div class=\"opacity-ladder\">\n      <div class=\"ladder-row\"><div class=\"step\">.85<\u002Fdiv><div class=\"demo\" style=\"color:rgba(0,0,0,.85)\">non-human poets, anti-gravitational word interfaces.<\u002Fdiv><div class=\"role\">body<\u002Fdiv><\u002Fdiv>\n      <div class=\"ladder-row\"><div class=\"step\">.70<\u002Fdiv><div class=\"demo\" style=\"color:rgba(0,0,0,.70)\">non-human poets, anti-gravitational word interfaces.<\u002Fdiv><div class=\"role\">hover, secondary<\u002Fdiv><\u002Fdiv>\n      <div class=\"ladder-row\"><div class=\"step\">.60<\u002Fdiv><div class=\"demo\" style=\"color:rgba(0,0,0,.60)\">non-human poets, anti-gravitational word interfaces.<\u002Fdiv><div class=\"role\">subtitles<\u002Fdiv><\u002Fdiv>\n      <div class=\"ladder-row\"><div class=\"step\">.50<\u002Fdiv><div class=\"demo\" style=\"color:rgba(0,0,0,.50)\">non-human poets, anti-gravitational word interfaces.<\u002Fdiv><div class=\"role\">meta, dates<\u002Fdiv><\u002Fdiv>\n      <div class=\"ladder-row\"><div class=\"step\">.40<\u002Fdiv><div class=\"demo\" style=\"color:rgba(0,0,0,.40)\">non-human poets, anti-gravitational word interfaces.<\u002Fdiv><div class=\"role\">faintest<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>performance accents<\u002Fh3>\n    <p>five colors, one per performance. they appear as: 4px top border on performance cards, status pill fills, submit button background, focus ring, custom dot cursor, selected-state border on poem cards. <b>never<\u002Fb> as page chrome, never as background washes.<\u002Fp>\n\n    <table class=\"perf-table\">\n      <thead>\n        <tr><th>swatch<\u002Fth><th>performance<\u002Fth><th>raw hex<\u002Fth><th>aa text on white<\u002Fth><th>status<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr>\n          <td class=\"chip-cell\"><span class=\"chip-inline\" style=\"background:#8B5CF6\"><\u002Fspan><\u002Ftd>\n          <td class=\"name\">reverse.exe<\u002Ftd>\n          <td>#8B5CF6<\u002Ftd>\n          <td class=\"accessible\" style=\"color:var(--reverse-text)\">→ #6B3FE0<\u002Ftd>\n          <td><span class=\"pill upcoming\">upcoming<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td class=\"chip-cell\"><span class=\"chip-inline\" style=\"background:#2AA4DD\"><\u002Fspan><\u002Ftd>\n          <td class=\"name\">hard.exe<\u002Ftd>\n          <td>#2AA4DD<\u002Ftd>\n          <td class=\"accessible\" style=\"color:var(--hard-text)\">→ #1E6E96<\u002Ftd>\n          <td><span class=\"pill training\">training<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td class=\"chip-cell\"><span class=\"chip-inline\" style=\"background:#02F700\"><\u002Fspan><\u002Ftd>\n          <td class=\"name\">reinforcement.exe<\u002Ftd>\n          <td>#02F700<\u002Ftd>\n          <td class=\"accessible\" style=\"color:var(--reinforcement-text)\">→ #0B7A0A<\u002Ftd>\n          <td><span class=\"pill trained\">trained<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td class=\"chip-cell\"><span class=\"chip-inline\" style=\"background:#FEE005\"><\u002Fspan><\u002Ftd>\n          <td class=\"name\">versus.exe<\u002Ftd>\n          <td>#FEE005<\u002Ftd>\n          <td class=\"accessible\" style=\"color:var(--versus-text)\">→ #6B5C00<\u002Ftd>\n          <td><span class=\"pill trained\">trained<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n        <tr>\n          <td class=\"chip-cell\"><span class=\"chip-inline\" style=\"background:#F6009B\"><\u002Fspan><\u002Ftd>\n          <td class=\"name\">carnation.exe<\u002Ftd>\n          <td>#F6009B<\u002Ftd>\n          <td class=\"accessible\" style=\"color:var(--carnation-text)\">→ #B8006F<\u002Ftd>\n          <td><span class=\"pill trained\">trained<\u002Fspan><\u002Ftd>\n        <\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n\n    <div class=\"callout\">\n      <b>contrast rule.<\u002Fb> any accent applied to text on white must be darkened to meet WCAG AA 4.5:1.\n      borders / non-text UI darkened to 3:1. in the codebase this is <code style=\"font-family:var(--font-mono)\">accessibleTextColor()<\u002Fcode> /\n      <code style=\"font-family:var(--font-mono)\">accessibleUIColor()<\u002Fcode> - a binary search that walks the hue toward black.\n      raw hex never lands on a glyph.\n    <\u002Fdiv>\n\n    <h4>status pills<\u002Fh4>\n    <p style=\"margin-bottom: var(--s-3);\">the only place where chrome gets filled. three states, fixed colors - no performance accent inside the pill.<\u002Fp>\n    <div style=\"display:flex; gap: var(--s-3); flex-wrap: wrap; margin-bottom: var(--s-5);\">\n      <span class=\"pill upcoming\">upcoming<\u002Fspan>\n      <span class=\"pill training\">training<\u002Fspan>\n      <span class=\"pill trained\">trained<\u002Fspan>\n    <\u002Fdiv>\n\n    <pre style=\"font-family:var(--font-mono); font-size:0.82rem; color:var(--text-secondary); line-height:1.6; margin:0;\">upcoming  bg #f3f4f6   border #d1d5db   text #4b5563\ntraining  bg #ffffff   border #171717   text #171717\ntrained   bg #171717   border #171717   text #ffffff<\u002Fpre>\n  <\u002Fsection>\n\n  <!-- ===================== 04 TYPOGRAPHY ===================== -->\n  <section id=\"type\">\n    <div class=\"sec-head\">\n      <div class=\"num\">04<\u002Fdiv>\n      <div>\n        <h2>typography<\u002Fh2>\n        <p>four faces from type.cargo.site. distressed display + swiss variable sans + mono captions. the contrast between humanist and neutral is the signature move.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"callout\">\n      <b>fonts in this document are substitutes.<\u002Fb> the brand stack loads from\n      <span style=\"font-family:var(--font-mono)\">type.cargo.site<\u002Fspan> via\n      <span style=\"font-family:var(--font-mono)\">@font-face<\u002Fspan> with\n      <span style=\"font-family:var(--font-mono)\">font-display: block<\u002Fspan>.\n      this reference page substitutes <span style=\"font-family:var(--font-mono)\">VT323<\u002Fspan>,\n      <span style=\"font-family:var(--font-mono)\">Space Grotesk<\u002Fspan> and\n      <span style=\"font-family:var(--font-mono)\">JetBrains Mono<\u002Fspan>\n      so the rhythm and weight relationships read correctly without the licensed faces.\n      production output meant to represent the brand must use the real cargo stack.\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div>\n        <div class=\"label\">role · display<\u002Fdiv>\n        <div class=\"role\">terminal grotesque<\u002Fdiv>\n        <div class=\"sub\">distressed, humanist. the signature voice. once per page, big. drops to 4.5rem under 600px.<\u002Fdiv>\n        <div class=\"specs\">\n          <span><b>weight<\u002Fb> 400 only<\u002Fspan>\n          <span><b>size<\u002Fb> 7rem desktop / 4.5rem mobile<\u002Fspan>\n          <span><b>line-height<\u002Fb> 0.9<\u002Fspan>\n          <span><b>letter-spacing<\u002Fb> -0.01em<\u002Fspan>\n          <span><b>substitute<\u002Fb> VT323<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview\">\n        <div class=\"preview-display\">singulars<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div>\n        <div class=\"label\">role · body<\u002Fdiv>\n        <div class=\"role\">standard (book / bold)<\u002Fdiv>\n        <div class=\"sub\">body sans. paragraphs, voting copy, longer-form text. tight line-height for editorial density.<\u002Fdiv>\n        <div class=\"specs\">\n          <span><b>weights<\u002Fb> 400, 700<\u002Fspan>\n          <span><b>size<\u002Fb> 1.06 - 1.3rem<\u002Fspan>\n          <span><b>line-height<\u002Fb> 1.16 - 1.2<\u002Fspan>\n          <span><b>substitute<\u002Fb> Space Grotesk<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview\">\n        <p class=\"preview-body\" style=\"margin: 0 0 var(--s-3);\">visitors vote on poems blind during a training phase, then results are revealed once the model is trained.<\u002Fp>\n        <p class=\"preview-body bold\" style=\"margin: 0;\">this is where i break and mend things.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div>\n        <div class=\"label\">role · titles<\u002Fdiv>\n        <div class=\"role\">diatype variable<\u002Fdiv>\n        <div class=\"sub\">section titles. clean swiss variable sans. negative tracking on bigger sizes.<\u002Fdiv>\n        <div class=\"specs\">\n          <span><b>axis<\u002Fb> 200 - 1000<\u002Fspan>\n          <span><b>section<\u002Fb> 2rem / 700<\u002Fspan>\n          <span><b>sub-section<\u002Fb> 1.6rem / 700<\u002Fspan>\n          <span><b>line-height<\u002Fb> 1.05 - 1.1<\u002Fspan>\n          <span><b>substitute<\u002Fb> Space Grotesk (700)<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview\">\n        <div class=\"preview-title\">human-vs-machine poetry performances<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"type-spec\">\n      <div>\n        <div class=\"label\">role · captions / labels / nav<\u002Fdiv>\n        <div class=\"role\">diatype mono variable<\u002Fdiv>\n        <div class=\"sub\">the \"instrument panel\" type. captions, labels, meta, status pills, navigation. uppercase + tracked for chrome roles.<\u002Fdiv>\n        <div class=\"specs\">\n          <span><b>axis<\u002Fb> 200 - 700<\u002Fspan>\n          <span><b>size<\u002Fb> 0.7 - 1rem<\u002Fspan>\n          <span><b>case<\u002Fb> often uppercase<\u002Fspan>\n          <span><b>letter-spacing<\u002Fb> 0.05em (tracked)<\u002Fspan>\n          <span><b>substitute<\u002Fb> JetBrains Mono<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"preview\">\n        <div class=\"preview-mono\">brooklyn 03 / 26 / 2026 · trained<\u002Fdiv>\n        <div class=\"preview-mono\" style=\"margin-top: var(--s-3); color: var(--text-tertiary)\">12 poems · 248 votes<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>type scale<\u002Fh3>\n    <pre style=\"font-family:var(--font-mono); font-size:0.85rem; color:var(--text-secondary); line-height:1.7; margin:0 0 var(--s-5);\">--type-size-nav      1.08rem\n--type-size-base     1.06rem\n--type-size-caption  0.98rem\n--type-size-meta     0.96rem\n--type-size-section  2.00rem  /* diatype variable, 700 */\n--type-size-sub      1.60rem  /* diatype variable, 700 */\n--type-size-display  7.00rem  /* terminal grotesque, 400, lh 0.9 */<\u002Fpre>\n\n    <h3>poetry rule<\u002Fh3>\n    <p>poem text uses <code style=\"font-family:var(--font-mono)\">white-space: pre-line<\u002Fcode>. line breaks and stanzas are preserved. never reflow whitespace inside a poem - it is the structure of the work.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- ===================== 05 LAYOUT ===================== -->\n  <section id=\"layout\">\n    <div class=\"sec-head\">\n      <div class=\"num\">05<\u002Fdiv>\n      <div>\n        <h2>layout<\u002Fh2>\n        <p>two containers. one tight reading column for poetry, one full-bleed asymmetric grid for the parent site.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>containers<\u002Fh3>\n    <div class=\"grid-2\">\n      <div>\n        <h4>oulipo.xyz - full bleed<\u002Fh4>\n        <p style=\"margin: 0;\"><code style=\"font-family:var(--font-mono)\">.page { padding: 4rem }<\u002Fcode><br>collapses to <code style=\"font-family:var(--font-mono)\">2rem<\u002Fcode> under 600px. no max-width on body. asymmetric cargo splits: 5/7, 3/8, 8/4, 2fr 1fr. off-balance rhythm is intentional.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h4>singulars - reading column<\u002Fh4>\n        <p style=\"margin: 0;\"><code style=\"font-family:var(--font-mono)\">max-width: 800px; margin: 0 auto; padding: 4rem 2rem;<\u002Fcode><br>narrow column is the reading column for poetry. don't widen it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>grids<\u002Fh3>\n    <ul>\n      <li>landing performance cards: <code style=\"font-family:var(--font-mono)\">repeat(3, 1fr)<\u002Fcode> with <code style=\"font-family:var(--font-mono)\">2rem<\u002Fcode> gap → 2 cols @ 900px → 1 col @ 600px<\u002Fli>\n      <li>mini-voting poems: <code style=\"font-family:var(--font-mono)\">repeat(auto-fit, minmax(280px, 1fr))<\u002Fcode> with <code style=\"font-family:var(--font-mono)\">2rem<\u002Fcode> gap<\u002Fli>\n      <li>content blocks gallery: 3 cols default, 4 cols dense (5+ items)<\u002Fli>\n    <\u002Ful>\n\n    <h3>spacing scale<\u002Fh3>\n    <p>stick to this. eight steps, rem-based.<\u002Fp>\n    <div class=\"spacing-scale\">\n      <div class=\"spacing-row\"><div class=\"name\">s-1<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(0.25rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">0.25 rem · 4 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-2<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(0.5rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">0.5 rem · 8 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-3<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(0.75rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">0.75 rem · 12 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-4<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(1rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">1 rem · 16 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-5<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(1.5rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">1.5 rem · 24 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-6<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(2rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">2 rem · 32 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-7<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(3rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">3 rem · 48 px<\u002Fdiv><\u002Fdiv>\n      <div class=\"spacing-row\"><div class=\"name\">s-8<\u002Fdiv><div><div class=\"bar\" style=\"width: calc(4rem * 16);\"><\u002Fdiv><\u002Fdiv><div class=\"val\">4 rem · 64 px<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>breakpoints &amp; aspect ratios<\u002Fh3>\n    <pre style=\"font-family:var(--font-mono); font-size:0.85rem; color:var(--text-secondary); line-height:1.7; margin:0;\">breakpoints   768  (chat sidebar collapse)\n              900  (3-col → 2-col grids)\n              600  (full mobile - hero shrinks, single column)\n\naspect ratios 16/9  hero / performance card images\n              1/1   dense gallery items (object-fit: cover)<\u002Fpre>\n  <\u002Fsection>\n\n  <!-- ===================== 06 COMPONENTS ===================== -->\n  <section id=\"components\">\n    <div class=\"sec-head\">\n      <div class=\"num\">06<\u002Fdiv>\n      <div>\n        <h2>components<\u002Fh2>\n        <p>the working set. each one cited exactly as it appears in the codebase. accent color is parameterized via <code style=\"font-family:var(--font-mono)\">--acc<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- nav links + buttons + pills -->\n    <h3>nav link · status pill · submit button<\u002Fh3>\n    <div class=\"gallery\">\n      <div class=\"specimen\">\n        <div class=\"label\"><span>nav link<\u002Fspan><span class=\"right\">diatype mono · 0.85rem · 6px radius<\u002Fspan><\u002Fdiv>\n        <a href=\"#components\" class=\"nav-link\">about<\u002Fa>\n        <a href=\"#components\" class=\"nav-link\">performances<\u002Fa>\n        <a href=\"#components\" class=\"nav-link external\">cargo site<\u002Fa>\n      <\u002Fdiv>\n      <div class=\"specimen\">\n        <div class=\"label\"><span>status pill<\u002Fspan><span class=\"right\">diatype mono · 0.7rem · 2px radius<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex; gap: var(--s-3); flex-wrap: wrap;\">\n          <span class=\"pill upcoming\">upcoming<\u002Fspan>\n          <span class=\"pill training\">training<\u002Fspan>\n          <span class=\"pill trained\">trained<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"specimen\">\n        <div class=\"label\"><span>submit button (hard.exe)<\u002Fspan><span class=\"right\">accent fill · standard 700 · no radius<\u002Fspan><\u002Fdiv>\n        <button class=\"submit-btn\" style=\"--btn-color: var(--hard);\">submit vote<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"specimen\">\n        <div class=\"label\"><span>submit button (carnation.exe)<\u002Fspan><span class=\"right\">accent fill<\u002Fspan><\u002Fdiv>\n        <button class=\"submit-btn\" style=\"--btn-color: var(--carnation);\">submit vote<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- performance card -->\n    <h3>performance card<\u002Fh3>\n    <p>top-border in performance accent. 16/9 image grayscaled by default, color on hover. dot cursor in accent on hover. title 1.1rem / 500. metadata mono in tertiary.<\u002Fp>\n    <div class=\"gallery\" id=\"perf-cards\">\n      <div class=\"perf-card\" style=\"--acc: var(--reverse); --img-bg: linear-gradient(135deg,#999,#222);\">\n        <div class=\"img\" data-img=\"reverse\"><\u002Fdiv>\n        <div class=\"title\">reverse.exe<\u002Fdiv>\n        <div class=\"meta\">brooklyn · 05/14/2026<br><span class=\"pill upcoming\" style=\"margin-top: var(--s-2);\">upcoming<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--hard); --img-bg: linear-gradient(160deg,#bbb,#333);\">\n        <div class=\"img\" data-img=\"hard\"><\u002Fdiv>\n        <div class=\"title\">hard.exe<\u002Fdiv>\n        <div class=\"meta\">los angeles · 03/26/2026<br><span class=\"pill training\" style=\"margin-top: var(--s-2);\">training<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--carnation); --img-bg: linear-gradient(120deg,#aaa,#444);\">\n        <div class=\"img\" data-img=\"carnation\"><\u002Fdiv>\n        <div class=\"title\">carnation.exe<\u002Fdiv>\n        <div class=\"meta\">beirut · 11/02/2025<br><span class=\"pill trained\" style=\"margin-top: var(--s-2);\">trained<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- poem set -->\n    <h3>poem card / voteable set<\u002Fh3>\n    <p>2px top border (light by default, accent when selected). cursor swaps to dot in accent on hover. when one is selected, siblings drop to 0.5 opacity. <code style=\"font-family:var(--font-mono)\">white-space: pre-line<\u002Fcode>. click a poem below to see the contrast collapse.<\u002Fp>\n\n    <div class=\"poem-set\" id=\"poem-set\" style=\"--acc: var(--hard);\">\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"a\">i am the salt that arrives without permission\nthe tongue that learned its name in a second language\nthe suitcase that does not close\n\nevery border is a sentence i am still translating<\u002Fdiv>\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"b\">in the kitchen my grandmother\nfolds the dough into something\nthat will outlive both of us\n\na small machine for memory\nthat runs on heat and waiting<\u002Fdiv>\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"c\">the model dreams in nouns it has not yet seen\nrecombines the verbs of departure\nand produces, sometimes, a line\n\nthat startles even the silence between us<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- blockquote -->\n    <h3>blockquote<\u002Fh3>\n    <blockquote>the chrome should not call attention to itself. the work calls attention to itself.<\u002Fblockquote>\n\n    <!-- focus rings -->\n    <h3>focus state · keyboard first<\u002Fh3>\n    <p>3px solid in performance accent, 2px offset. tab through these:<\u002Fp>\n    <div style=\"--focus-color: var(--hard);\">\n      <button class=\"focus-demo\">vote a<\u002Fbutton>\n      <button class=\"focus-demo\">vote b<\u002Fbutton>\n      <button class=\"focus-demo\">vote c<\u002Fbutton>\n      <button class=\"focus-demo\">submit<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== 07 INTERACTIONS ===================== -->\n  <section id=\"interactions\">\n    <div class=\"sec-head\">\n      <div class=\"num\">07<\u002Fdiv>\n      <div>\n        <h2>interactions<\u002Fh2>\n        <p>the five moves that distinguish the system. reuse them. before introducing a sixth, justify why the existing five aren't enough.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 1. dot cursor -->\n    <h3>01 — custom dot cursor<\u002Fh3>\n    <p>inline svg circle (8px radius, 20×20 viewbox), filled in performance accent, encoded as data URI in <code style=\"font-family:var(--font-mono)\">cursor: url(...)<\u002Fcode>. applied on hover over interactive surfaces. hover the swatches below.<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--s-4); margin: var(--s-5) 0;\">\n      <div class=\"cursor-zone\" data-color=\"#8B5CF6\" style=\"aspect-ratio: 1; background: #f6f6f6; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;\">reverse<\u002Fspan><\u002Fdiv>\n      <div class=\"cursor-zone\" data-color=\"#2AA4DD\" style=\"aspect-ratio: 1; background: #f6f6f6; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;\">hard<\u002Fspan><\u002Fdiv>\n      <div class=\"cursor-zone\" data-color=\"#02F700\" style=\"aspect-ratio: 1; background: #f6f6f6; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;\">reinforcement<\u002Fspan><\u002Fdiv>\n      <div class=\"cursor-zone\" data-color=\"#FEE005\" style=\"aspect-ratio: 1; background: #f6f6f6; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;\">versus<\u002Fspan><\u002Fdiv>\n      <div class=\"cursor-zone\" data-color=\"#F6009B\" style=\"aspect-ratio: 1; background: #f6f6f6; display: flex; align-items: center; justify-content: center;\"><span style=\"font-family: var(--font-mono); font-size: 0.78rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em;\">carnation<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 2. grayscale to color -->\n    <h3>02 — grayscale-to-color reveal<\u002Fh3>\n    <p>images load as <code style=\"font-family:var(--font-mono)\">filter: grayscale(100%)<\u002Fcode>. on hover, animate to <code style=\"font-family:var(--font-mono)\">grayscale(0%)<\u002Fcode> over 0.5s ease. <em>the hover is the color.<\u002Fem> hover an image:<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-5); margin: var(--s-5) 0;\">\n      <div class=\"grayscale-demo\" style=\"aspect-ratio: 16/9; background: linear-gradient(135deg, #8B5CF6 0%, #F6009B 100%); filter: grayscale(100%); transition: filter 0.5s ease;\"><\u002Fdiv>\n      <div class=\"grayscale-demo\" style=\"aspect-ratio: 16/9; background: linear-gradient(120deg, #2AA4DD 0%, #02F700 100%); filter: grayscale(100%); transition: filter 0.5s ease;\"><\u002Fdiv>\n      <div class=\"grayscale-demo\" style=\"aspect-ratio: 16/9; background: linear-gradient(160deg, #FEE005 0%, #F6009B 100%); filter: grayscale(100%); transition: filter 0.5s ease;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 3. opacity hover -->\n    <h3>03 — uniform opacity hover<\u002Fh3>\n    <p>links and many interactive elements drop to <code style=\"font-family:var(--font-mono)\">opacity: 0.7<\u002Fcode> on hover, 0.3s ease. no color shift, no underline toggle. site-wide.<\u002Fp>\n    <div style=\"font-family: var(--font-body); font-size: 1.1rem; line-height: 1.6; margin: var(--s-5) 0;\">\n      <p style=\"max-width: 60ch;\">a kitchen laboratory of <a href=\"#interactions\">experimental computational poetry<\u002Fa>. non-human poets, <a href=\"#interactions\">anti-gravitational word interfaces<\u002Fa>, somatic semantics. this is where i <a href=\"#interactions\">break and mend things<\u002Fa>.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- 4. contrast collapse -->\n    <h3>04 — selection by contrast collapse<\u002Fh3>\n    <p>when one item in a group is selected, unselected siblings drop to <code style=\"font-family:var(--font-mono)\">opacity: 0.5<\u002Fcode> and the selected item gains the accent border. the choice is shown by <em>everything else stepping back<\u002Fem>. click an option below:<\u002Fp>\n    <div class=\"poem-set\" id=\"collapse-set\" style=\"--acc: var(--carnation); margin: var(--s-5) 0; max-width: 720px;\">\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"ca\">option a — let the light eat its own outline<\u002Fdiv>\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"cb\">option b — fold the salt into the syllable<\u002Fdiv>\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"cc\">option c — speak only the words the model has not yet heard<\u002Fdiv>\n      <div class=\"poem\" tabindex=\"0\" data-poem=\"cd\">option d — refuse the question and answer the silence<\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 5. focus rings -->\n    <h3>05 — visible focus rings<\u002Fh3>\n    <p>3px solid outline in performance accent, 2px offset. keyboard nav is first-class. tab through:<\u002Fp>\n    <div style=\"--focus-color: var(--reverse);\">\n      <button class=\"focus-demo\">reverse.exe focus<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"--focus-color: var(--reinforcement); margin-top: var(--s-3);\">\n      <button class=\"focus-demo\">reinforcement.exe focus<\u002Fbutton>\n    <\u002Fdiv>\n    <div style=\"--focus-color: var(--versus); margin-top: var(--s-3);\">\n      <button class=\"focus-demo\">versus.exe focus<\u002Fbutton>\n    <\u002Fdiv>\n\n    <h3>timing<\u002Fh3>\n    <pre style=\"font-family:var(--font-mono); font-size:0.85rem; color:var(--text-secondary); line-height:1.7; margin:0;\">opacity transitions    0.3s ease\nfilter (grayscale)     0.5s ease\nborder-color           0.3s ease\nnav border-color       0.2s ease\n\nno easing curves beyond ease.\nno slides, bounces, scales, or staggered choreography.<\u002Fpre>\n  <\u002Fsection>\n\n  <!-- ===================== 08 ACCESSIBILITY ===================== -->\n  <section id=\"accessibility\">\n    <div class=\"sec-head\">\n      <div class=\"num\">08<\u002Fdiv>\n      <div>\n        <h2>accessibility<\u002Fh2>\n        <p>built into the system, not bolted on. accent color is the place where it gets enforced programmatically.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <ul>\n      <li><b>WCAG AA enforced on accent text<\u002Fb> via <code style=\"font-family:var(--font-mono)\">ensureContrast()<\u002Fcode> / <code style=\"font-family:var(--font-mono)\">accessibleTextColor()<\u002Fcode>. binary search darkens the hue until 4.5:1 is met. raw hex never lands on a glyph.<\u002Fli>\n      <li><b>UI accent on borders<\u002Fb> darkened to 3:1 via <code style=\"font-family:var(--font-mono)\">accessibleUIColor()<\u002Fcode>.<\u002Fli>\n      <li><b>Focus rings always visible.<\u002Fb> 3px solid, 2px offset, in accent. never <code style=\"font-family:var(--font-mono)\">outline: none<\u002Fcode>.<\u002Fli>\n      <li><b>Custom cursor is hover affordance only.<\u002Fb> default <code style=\"font-family:var(--font-mono)\">pointer<\u002Fcode> is the real interactivity signal.<\u002Fli>\n      <li><b>Poem structure preserved.<\u002Fb> <code style=\"font-family:var(--font-mono)\">white-space: pre-line<\u002Fcode> keeps line breaks for screen readers.<\u002Fli>\n      <li><b>Voting is blind during training.<\u002Fb> no human/machine labels on cards. the model is judged on the work.<\u002Fli>\n    <\u002Ful>\n  <\u002Fsection>\n\n  <!-- ===================== 09 ANTI-PATTERNS ===================== -->\n  <section id=\"anti\">\n    <div class=\"sec-head\">\n      <div class=\"num\">09<\u002Fdiv>\n      <div>\n        <h2>anti-patterns<\u002Fh2>\n        <p>what this system is not. these are the design-by-default moves to actively reject.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"anti\">\n      <div class=\"card\">\n        <div class=\"label\">don't<\u002Fdiv>\n        <div class=\"bad-card\">\n          <div class=\"t\">card with shadow<\u002Fdiv>\n          <div class=\"s\">rounded corners, drop shadow, gradient fill, padding chrome.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"x\" style=\"margin-top: var(--s-4);\">no shadows, no rounded corners, no gradient fills<\u002Fdiv>\n        <div class=\"x ok\">use a hairline rule and white space<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"label\">don't<\u002Fdiv>\n        <div style=\"background: linear-gradient(135deg, #2AA4DD 0%, #F6009B 100%); padding: 1.5rem; color: white;\">\n          <div style=\"font-family: var(--font-body); font-weight: 700; font-size: 1.1rem;\">accent as page chrome<\u002Fdiv>\n          <div style=\"font-family: var(--font-body); font-size: 0.9rem; margin-top: 0.5rem;\">background washes, hero gradients, full-bleed accent panels.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"x\" style=\"margin-top: var(--s-4);\">accent as a wash, panel background, gradient<\u002Fdiv>\n        <div class=\"x ok\">accent as a 4px border, pill fill, button, focus ring<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"card\">\n        <div class=\"label\">don't<\u002Fdiv>\n        <div style=\"font-family: var(--font-body); font-size: 1.1rem;\">\n          <p style=\"margin: 0 0 0.5rem;\">Welcome to Singulars! 🎉 The revolutionary ✨ poetry experience that will <em>delight<\u002Fem> you—seamlessly.<\u002Fp>\n        <\u002Fdiv>\n        <div class=\"x\" style=\"margin-top: var(--s-4);\">title case, em dashes, emojis, marketing puff<\u002Fdiv>\n        <div class=\"x ok\">lower-case, hyphen-with-spaces, declarative, image-led<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ===================== 10 EXAMPLES ===================== -->\n  <section id=\"examples\">\n    <div class=\"sec-head\">\n      <div class=\"num\">10<\u002Fdiv>\n      <div>\n        <h2>examples in context<\u002Fh2>\n        <p>two compositions assembled from the system - a singulars performance card grid, and a voting set in the reading column.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>landing - performance grid<\u002Fh3>\n    <div style=\"display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-6); margin: var(--s-5) 0;\">\n      <div class=\"perf-card\" style=\"--acc: var(--reverse); --img-bg: linear-gradient(135deg,#9a9a9a,#1a1a1a);\">\n        <div class=\"img\" data-img=\"rev2\"><\u002Fdiv>\n        <div class=\"title\">reverse.exe<\u002Fdiv>\n        <div class=\"meta\">brooklyn · 05/14/2026<br><span class=\"pill upcoming\" style=\"margin-top: var(--s-2);\">upcoming<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--hard); --img-bg: linear-gradient(160deg,#b3b3b3,#2a2a2a);\">\n        <div class=\"img\" data-img=\"hard2\"><\u002Fdiv>\n        <div class=\"title\">hard.exe<\u002Fdiv>\n        <div class=\"meta\">los angeles · 03/26/2026<br><span class=\"pill training\" style=\"margin-top: var(--s-2);\">training<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--reinforcement); --img-bg: linear-gradient(110deg,#a8a8a8,#202020);\">\n        <div class=\"img\" data-img=\"rein2\"><\u002Fdiv>\n        <div class=\"title\">reinforcement.exe<\u002Fdiv>\n        <div class=\"meta\">mexico city · 01/18/2026<br><span class=\"pill trained\" style=\"margin-top: var(--s-2);\">trained<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--versus); --img-bg: linear-gradient(140deg,#a0a0a0,#252525);\">\n        <div class=\"img\" data-img=\"ver2\"><\u002Fdiv>\n        <div class=\"title\">versus.exe<\u002Fdiv>\n        <div class=\"meta\">paris · 12/04/2025<br><span class=\"pill trained\" style=\"margin-top: var(--s-2);\">trained<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"perf-card\" style=\"--acc: var(--carnation); --img-bg: linear-gradient(120deg,#a5a5a5,#1f1f1f);\">\n        <div class=\"img\" data-img=\"carn2\"><\u002Fdiv>\n        <div class=\"title\">carnation.exe<\u002Fdiv>\n        <div class=\"meta\">beirut · 11/02/2025<br><span class=\"pill trained\" style=\"margin-top: var(--s-2);\">trained<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <h3>singulars - reading column with voting<\u002Fh3>\n    <div style=\"max-width: 560px; margin: var(--s-5) 0; padding: var(--s-6) 0; border-top: 4px solid var(--hard); border-bottom: 1px solid var(--border-light);\">\n      <div style=\"font-family: var(--font-mono); font-size: 0.85rem; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--s-3);\">hard.exe · vote<\u002Fdiv>\n      <h4 style=\"font-family: var(--font-title); font-size: 1.6rem; font-weight: 700; color: var(--text-primary); text-transform: none; letter-spacing: -0.005em; margin: 0 0 var(--s-3);\">which line carries the salt<\u002Fh4>\n      <p style=\"font-family: var(--font-body); font-size: 1.06rem; line-height: 1.5; color: var(--text-secondary); margin: 0 0 var(--s-5); max-width: 50ch;\">three candidate lines for the second stanza of <i>hard.exe<\u002Fi>. the model has not been told which it wrote. neither have you.<\u002Fp>\n\n      <div class=\"poem-set\" id=\"poem-set-2\" style=\"--acc: var(--hard);\">\n        <div class=\"poem\" tabindex=\"0\" data-poem=\"d\">i carry the word for salt in three languages\nnone of them remember me back<\u002Fdiv>\n        <div class=\"poem\" tabindex=\"0\" data-poem=\"e\">salt is the only inheritance that travels\nwithout a passport<\u002Fdiv>\n        <div class=\"poem\" tabindex=\"0\" data-poem=\"f\">in the mouth of the machine\nsalt is a parameter\nin the mouth of the body\nit is a wound that learned to taste<\u002Fdiv>\n      <\u002Fdiv>\n\n      <button class=\"submit-btn\" style=\"--btn-color: var(--hard); margin-top: var(--s-5);\">submit vote<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <footer>\n    <div>\n      singulars / oulipo design system v1<br>\n      reference document - this page is a substitute for the brand fonts; production output uses the cargo stack.\n    <\u002Fdiv>\n    <div>\n      apr 2026\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fmain>\n\n<script>\n  // ---------- custom dot cursor (data URI) ----------\n  function dotCursor(hex) {\n    const svg = `<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"20\" height=\"20\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8\" fill=\"${hex}\"/><\u002Fsvg>`;\n    return `url('data:image/svg+xml;utf8,${encodeURIComponent(svg)}') 10 10, pointer`;\n  }\n\n  // apply the dot cursor to every cursor-zone box\n  document.querySelectorAll('.cursor-zone').forEach(el => {\n    el.style.cursor = dotCursor(el.dataset.color);\n  });\n\n  // apply dot cursor to perf cards (color from --acc)\n  document.querySelectorAll('.perf-card').forEach(el => {\n    const acc = getComputedStyle(el).getPropertyValue('--acc').trim();\n    el.style.cursor = dotCursor(acc);\n  });\n\n  // apply dot cursor to poems within each poem-set, taking accent from the set\n  document.querySelectorAll('.poem-set').forEach(set => {\n    const acc = getComputedStyle(set).getPropertyValue('--acc').trim();\n    set.querySelectorAll('.poem').forEach(p => p.style.cursor = dotCursor(acc));\n  });\n\n  // ---------- selection by contrast collapse ----------\n  document.querySelectorAll('.poem-set').forEach(set => {\n    set.addEventListener('click', e => {\n      const poem = e.target.closest('.poem');\n      if (!poem) return;\n      const wasSelected = poem.classList.contains('selected');\n      set.querySelectorAll('.poem').forEach(p => p.classList.remove('selected'));\n      if (!wasSelected) poem.classList.add('selected');\n      set.classList.toggle('has-selected', !wasSelected);\n    });\n    set.addEventListener('keydown', e => {\n      if (e.key === 'Enter' || e.key === ' ') {\n        const poem = e.target.closest('.poem');\n        if (poem) { e.preventDefault(); poem.click(); }\n      }\n    });\n  });\n\n  // ---------- grayscale-to-color reveal ----------\n  // (handled in CSS via :hover, but ensure touch devices still see the effect)\n  document.querySelectorAll('.grayscale-demo').forEach(el => {\n    el.addEventListener('mouseenter', () => el.style.filter = 'grayscale(0%)');\n    el.addEventListener('mouseleave', () => el.style.filter = 'grayscale(100%)');\n  });\n  // perf-card image already CSS-driven via .perf-card:hover .img\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
    </script>
  </body>
</html>
