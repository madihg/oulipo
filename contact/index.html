<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Halim Madi</title>
    <meta
      name="description"
      content="Get in touch with Halim Madi — contact form, social links, and booking."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◉</text></svg>"
    />
    <link rel="stylesheet" href="../Assets/css/shared.css" />
    <style>
      .contact-content {
        max-width: 600px;
      }

      .contact-content h2 {
        margin: 0 0 2rem;
      }

      .contact-form {
        margin-bottom: 2.5rem;
      }

      .form-field {
        display: block;
        width: 100%;
        border: 1px solid rgba(0, 0, 0, 0.4);
        border-radius: 0;
        padding: 0.75rem;
        font-family: Standard, sans-serif;
        font-size: 1rem;
        color: rgba(0, 0, 0, 0.85);
        background: #ffffff;
        margin-bottom: 1rem;
        -webkit-appearance: none;
      }

      .form-field:focus {
        outline: none;
        border-color: rgba(0, 0, 0, 0.85);
      }

      textarea.form-field {
        min-height: 150px;
        resize: vertical;
      }

      .form-label {
        display: block;
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
        color: rgba(0, 0, 0, 0.6);
      }

      .form-submit {
        display: inline-block;
        background: transparent;
        color: rgba(0, 0, 0, 0.85);
        border: 0.2rem solid rgba(0, 0, 0, 0.85);
        border-radius: 0.5rem;
        padding: 0.8rem 1rem;
        font-family: Standard, sans-serif;
        font-size: 1.3rem;
        cursor: pointer;
        transition: opacity 0.3s ease;
        -webkit-appearance: none;
      }

      .form-submit:hover {
        opacity: 0.7;
      }

      .contact-links {
        list-style: none;
        padding: 0;
        margin: 1rem 0 0;
      }

      .contact-links li {
        margin-bottom: 0.25rem;
      }

      .contact-links a {
        color: rgba(0, 0, 0, 0.85);
        transition: opacity 0.3s ease;
      }
    </style>
  </head>
  <body>
    <div class="site-header"><a href="/home/">Halim Madi</a></div>

    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="menu-overlay" onclick="toggleMenu()"></div>

    <nav class="side-menu">
      <div class="menu-header">
        <a href="/home/" class="menu-home">Home</a>
        <button
          class="menu-close"
          onclick="toggleMenu()"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>
      <div class="menu-section">
        <a href="/works/">Works</a>
        <a href="/keynotes/">Keynotes</a>
        <a href="/workshops/">Workshops</a>
        <a href="/books/">Books</a>
      </div>
      <hr class="menu-divider" />
      <div class="menu-section">
        <a href="/about/">About</a>
        <a href="/upcoming/">Upcoming</a>
        <a href="/contact/">Contact</a>
        <a href="https://halimmadi.substack.com/" target="_blank"
          >Newsletter &#8599;</a
        >
        <a href="https://www.instagram.com/yalla_halim" target="_blank"
          >Instagram &#8599;</a
        >
      </div>
    </nav>

    <div class="page">
      <div class="page-content contact-content">
        <h2>Get in Touch</h2>

        <!-- TODO: Replace FORM_ID with your actual Formspree form ID -->
        <form
          class="contact-form"
          action="https://formspree.io/f/FORM_ID"
          method="POST"
        >
          <label class="form-label" for="name">Name</label>
          <input
            class="form-field"
            type="text"
            id="name"
            name="name"
            required
          />

          <label class="form-label" for="email">Email</label>
          <input
            class="form-field"
            type="email"
            id="email"
            name="email"
            required
          />

          <label class="form-label" for="message">Message</label>
          <textarea
            class="form-field"
            id="message"
            name="message"
            required
          ></textarea>

          <button class="form-submit" type="submit">Send</button>
        </form>

        <hr />

        <ul class="contact-links">
          <li>
            <a href="https://www.instagram.com/yalla_halim" target="_blank"
              >Instagram &#8599;</a
            >
          </li>
          <li>
            <a href="https://www.linkedin.com/in/madihalim" target="_blank"
              >LinkedIn &#8599;</a
            >
          </li>
          <li>
            <a href="https://www.youtube.com/@yalla_halim" target="_blank"
              >YouTube &#8599;</a
            >
          </li>
          <li>
            <a href="https://halimmadi.substack.com/" target="_blank"
              >Newsletter &#8599;</a
            >
          </li>
          <li>
            <a href="https://cal.com/halim-madi" target="_blank"
              >Book a meeting &#8599;</a
            >
          </li>
        </ul>
      </div>
    </div>

    <script src="../Assets/js/menu.js"></script>
  </body>
</html>
