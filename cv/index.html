<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV — oulipo.xyz</title>
    <meta
      name="description"
      content="Events, performances, workshops, and keynotes by Halim Madi."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◉</text></svg>"
    />

    <style>
      /* Cargo Fonts */
      @font-face {
        font-display: block;
        font-family: "Standard";
        src: url("https://type.cargo.site/files/Standard-Book.woff")
          format("woff");
        font-style: normal;
        font-weight: normal;
      }
      @font-face {
        font-display: block;
        font-family: "Standard";
        src: url("https://type.cargo.site/files/Standard-Bold.woff")
          format("woff");
        font-style: normal;
        font-weight: bold;
      }
      @font-face {
        font-display: block;
        font-family: "Diatype Variable";
        src: url("https://type.cargo.site/files/Cargo-DiatypePlusVariable.woff2")
          format("woff2-variations");
        font-style: normal;
        font-weight: 200 1000;
      }
      @font-face {
        font-display: block;
        font-family: "Diatype Mono Variable";
        src: url("https://type.cargo.site/files/Cargo-DiatypePlusVariable.woff2")
          format("woff2-variations");
        font-style: normal;
        font-weight: 200 700;
      }

      html {
        font-size: 16px;
      }

      :root {
        --type-size-nav: 1.08rem;
        --type-size-base: 1.06rem;
        --type-size-caption: 0.98rem;
        --type-size-meta: 0.96rem;
        --content-width: 54rem;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #ffffff;
        color: rgba(0, 0, 0, 0.85);
        font-family: Standard, sans-serif;
        font-size: var(--type-size-base);
        line-height: 1.16;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      * {
        box-sizing: border-box;
      }

      a {
        color: rgba(0, 0, 0, 0.85);
        text-decoration: underline;
      }

      a:hover {
        opacity: 0.7;
      }

      /* Page layout - left-aligned to match header */
      .page {
        min-height: 100vh;
      }

      .page-layout {
        padding: 0 4rem 2rem;
        margin-top: 3.5rem;
        max-width: var(--content-width);
        display: flex;
        flex-direction: column;
      }

      .page-content {
        align-items: flex-start;
        text-align: left;
        padding: 0;
        background-color: #ffffff;
        width: 100%;
      }

      /* Typography */
      .caption {
        font-size: var(--type-size-caption);
        font-weight: 400;
        color: #000000;
        font-family: "Diatype Mono Variable", monospace;
        font-style: normal;
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        line-height: 1.14;
        letter-spacing: 0em;
      }

      .caption a {
        color: #000000;
        text-decoration: underline;
      }

      hr {
        background: rgba(0, 0, 0, 0.75);
        border: 0;
        height: 1px;
        display: block;
        margin: 0.5rem 0;
        width: 100%;
      }

      b {
        font-weight: bold;
      }

      /* Title area */
      .page-title {
        text-align: left;
        margin-bottom: 0.6rem;
        font-family: Standard, sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1.08;
      }

      /* Section heading */
      .section-heading {
        font-family: Standard, sans-serif;
        font-size: 1.12rem;
        font-weight: 700;
        margin: 1.15rem 0 0.35rem 0;
        color: rgba(0, 0, 0, 0.85);
      }

      .section-heading:first-of-type {
        margin-top: 0.4rem;
      }

      /* Year prefix inline */
      .event-year {
        font-family: "Diatype Mono Variable", monospace;
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        color: rgba(0, 0, 0, 0.6);
      }

      /* Event entry */
      .event {
        margin: 0;
      }

      .event-head {
        font-size: var(--type-size-base);
        line-height: 1.12;
      }

      .event-head b {
        font-weight: 700;
      }

      .event-description,
      .event-meta {
        display: block;
        font-family: "Diatype Mono Variable", monospace;
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        color: #000000;
        line-height: 1.14;
        letter-spacing: 0em;
      }

      .event-description {
        font-size: var(--type-size-caption);
      }

      .event-meta {
        font-size: var(--type-size-meta);
      }

      .event-meta a {
        color: #000000;
        text-decoration: underline;
        text-underline-offset: 0.08em;
      }

      /* Site Header */
      body.menu-open {
        overflow: hidden;
      }

      .site-header {
        position: fixed;
        top: 1.5rem;
        left: 4rem;
        z-index: 200;
        font-family: Standard, sans-serif;
        font-size: var(--type-size-nav);
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .site-header a {
        text-decoration: none;
        color: rgba(0, 0, 0, 0.85);
      }

      .site-header a:hover {
        opacity: 0.7;
      }

      .site-header.hidden {
        opacity: 0;
        visibility: hidden;
      }

      /* Menu Toggle Button */
      .menu-toggle {
        position: fixed;
        top: 1.5rem;
        right: 4rem;
        z-index: 200;
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        width: 24px;
        height: 24px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 5px;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .menu-toggle.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .menu-toggle span {
        display: block;
        width: 100%;
        height: 2px;
        background-color: rgba(0, 0, 0, 0.85);
        transition:
          transform 0.3s,
          opacity 0.3s;
      }

      .menu-toggle:hover {
        opacity: 0.7;
      }

      /* Side Menu Overlay */
      .menu-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: rgba(0, 0, 0, 0.25);
        z-index: 998;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.3s ease,
          visibility 0.3s ease;
      }

      .menu-overlay.active {
        opacity: 1;
        visibility: visible;
      }

      /* Side Menu Drawer */
      .side-menu {
        position: fixed;
        top: 0;
        right: 0;
        width: 420px;
        height: 100%;
        background-color: #ffffff;
        z-index: 999;
        padding: 2rem 4rem;
        transform: translateX(100%);
        transition: transform 0.3s ease;
        overflow-y: auto;
      }

      .side-menu.active {
        transform: translateX(0);
      }

      .menu-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-bottom: 0.75rem;
        margin-bottom: 0.75rem;
        border-bottom: 1px solid rgba(0, 0, 0, 0.85);
      }

      .menu-home {
        font-family: Standard, sans-serif;
        font-size: var(--type-size-nav);
        text-decoration: none;
        color: rgba(0, 0, 0, 0.85);
      }

      .menu-close {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
        font-size: 1.5rem;
        line-height: 1;
        color: rgba(0, 0, 0, 0.85);
      }

      .menu-close:hover {
        opacity: 0.7;
      }

      .menu-section {
        margin-bottom: 0;
      }

      .menu-section a {
        display: block;
        font-family: Standard, sans-serif;
        font-size: var(--type-size-nav);
        text-decoration: none;
        color: rgba(0, 0, 0, 0.85);
        line-height: 1.15;
      }

      .menu-section a:hover {
        opacity: 0.7;
      }

      .menu-divider {
        border: 0;
        height: 1px;
        background: rgba(0, 0, 0, 0.85);
        margin: 0.75rem 0;
      }

      /* Multi-column layout for CV sections */
      #cv-container {
        columns: 2;
        column-gap: 2rem;
      }

      .cv-section {
        break-inside: avoid;
        margin-bottom: 0.5rem;
      }

      /* 3 columns on wider screens */
      @media (min-width: 1200px) {
        :root {
          --content-width: 72rem;
        }

        #cv-container {
          columns: 3;
        }
      }

      /* 4 columns on very wide screens */
      @media (min-width: 1600px) {
        :root {
          --content-width: 92rem;
        }

        #cv-container {
          columns: 4;
        }
      }

      /* Responsive */
      @media (max-width: 900px) {
        .page-layout {
          width: min(100%, 34rem);
          max-width: 34rem;
          margin-top: 1.4rem;
          padding: 1.4rem 1.4rem 1.6rem;
        }

        #cv-container {
          columns: 1;
        }
      }

      @media (max-width: 768px) {
        .side-menu {
          width: 100%;
          padding: 2rem;
        }

        .menu-toggle {
          right: 2rem;
        }
      }

      @media (max-width: 600px) {
        :root {
          --type-size-nav: 1.05rem;
          --type-size-base: 1.03rem;
          --type-size-caption: 0.97rem;
          --type-size-meta: 0.95rem;
        }

        .page-layout {
          width: 100%;
          max-width: none;
          margin-top: 2.5rem;
          padding: 0.95rem 1.5rem 1.4rem;
        }

        .page-title {
          font-size: 1.4rem;
        }

        .site-header {
          left: 1.5rem;
          top: 1rem;
        }

        .menu-toggle {
          top: 1rem;
          right: 1.5rem;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <!-- Site Header -->
    <div class="site-header">
      <a href="https://halimmadi.com">Halim Madi</a>
    </div>

    <!-- Menu Toggle Button -->
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Menu Overlay -->
    <div class="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Side Menu Drawer -->
    <nav class="side-menu">
      <div class="menu-header">
        <a href="https://halimmadi.com/landing-1#hero-1" class="menu-home"
          >Home</a
        >
        <button
          class="menu-close"
          onclick="toggleMenu()"
          aria-label="Close menu"
        >
          ×
        </button>
      </div>

      <div class="menu-section">
        <a href="https://halimmadi.com/works-1">Works</a>
        <a href="https://halimmadi.com/keynotes">Keynotes</a>
        <a href="https://halimmadi.com/workshops-1">Workshops</a>
        <a href="https://halimmadi.com/books-overview">Books</a>
      </div>

      <hr class="menu-divider" />

      <div class="menu-section">
        <a href="https://halimmadi.com/about">About</a>
        <a href="https://halimmadi.com/upcoming">Upcoming</a>
        <a href="https://halimmadi.com/contact-form">Contact</a>
        <a
          href="https://halimmadi.substack.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Newsletter
          <span
            style="
              font-family: &quot;Diatype Mono Variable&quot;, monospace;
              font-variation-settings:
                &quot;slnt&quot; 0,
                &quot;MONO&quot; 1;
            "
            >&#x2197;</span
          ></a
        >
        <a
          href="https://www.instagram.com/yalla_halim"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram
          <span
            style="
              font-family: &quot;Diatype Mono Variable&quot;, monospace;
              font-variation-settings:
                &quot;slnt&quot; 0,
                &quot;MONO&quot; 1;
            "
            >&#x2197;</span
          ></a
        >
      </div>
    </nav>

    <div class="page">
      <div class="page-layout">
        <div class="page-content">
          <h1 class="page-title">CV</h1>

          <div id="cv-container"></div>
        </div>
      </div>
    </div>

    <script>
      function toggleMenu() {
        const menu = document.querySelector(".side-menu");
        const overlay = document.querySelector(".menu-overlay");
        const body = document.body;

        menu.classList.toggle("active");
        overlay.classList.toggle("active");
        body.classList.toggle("menu-open");
      }

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") {
          const menu = document.querySelector(".side-menu");
          if (menu.classList.contains("active")) {
            toggleMenu();
          }
        }
      });

      const siteHeader = document.querySelector(".site-header");
      const menuToggle = document.querySelector(".menu-toggle");

      window.addEventListener("scroll", function () {
        if (window.scrollY > 50) {
          siteHeader.classList.add("hidden");
          menuToggle.classList.add("hidden");
        } else {
          siteHeader.classList.remove("hidden");
          menuToggle.classList.remove("hidden");
        }
      });

      // ── Supabase Config ──
      const SUPABASE_URL = "https://smytgqkgomsfyurskpcl.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_m509hZmnUb8NZRG94irXqA_AViI-8qf";
      const _supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      function formatKind(kind) {
        if (!kind) return "";
        return kind
          .split("_")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      function escapeHtml(value) {
        const str = String(value ?? "");
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function parseEventDate(value) {
        if (!value) return null;
        const dt = new Date(value);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }

      function parseYearFromDisplay(dateDisplay) {
        const match = String(dateDisplay ?? "").match(/\b(19|20)\d{2}\b/);
        return match ? Number(match[0]) : null;
      }

      function safeExternalUrl(value) {
        if (!value) return null;
        try {
          const url = new URL(value, window.location.origin);
          if (url.protocol !== "http:" && url.protocol !== "https:") {
            return null;
          }
          return url.toString();
        } catch {
          return null;
        }
      }

      // Section definitions: label → array of kind values
      const CV_SECTIONS = [
        { label: "Exhibitions", kinds: ["exhibition"] },
        { label: "Residencies", kinds: ["residency"] },
        { label: "Fellowships", kinds: ["fellowship"] },
        { label: "Awards", kinds: ["award"] },
        { label: "Talks", kinds: ["keynote", "panel", "talk"] },
        { label: "Performances", kinds: ["performance"] },
        { label: "Workshops", kinds: ["workshop"] },
        { label: "Press", kinds: ["press"] },
        { label: "Books", kinds: ["book"] },
        { label: "Publications", kinds: ["publication"] },
        { label: "Art Writing", kinds: ["art_writing"] },
        { label: "Professional", kinds: ["professional_experience"] },
        { label: "Education", kinds: ["education"] },
      ];

      function buildMetaLine(event) {
        // In section view, skip the kind (it's redundant with the heading)
        const whereWhen = [event.location, event.date_display]
          .map((v) => String(v || "").trim())
          .filter(Boolean)
          .join(", ");
        if (!whereWhen) return "";
        return whereWhen.endsWith(".") ? whereWhen : `${whereWhen}.`;
      }

      function getYear(event) {
        const dt = parseEventDate(event.date) || parseEventDate(event.date_end);
        if (dt) return dt.getFullYear();
        return parseYearFromDisplay(event.date_display);
      }

      function renderCvEvent(event) {
        const linkUrl = safeExternalUrl(event.link);
        const org = escapeHtml(event.org);
        const title = escapeHtml(event.title);
        const description = event.description
          ? `<span class="event-description">${escapeHtml(event.description)}</span>`
          : "";
        const metaText = escapeHtml(buildMetaLine(event));
        const linkTag = linkUrl
          ? `<a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">Link \u2197</a>`
          : "";
        const metaParts = [];

        if (metaText) {
          metaParts.push(metaText);
        }
        if (linkTag) {
          metaParts.push(linkTag);
        }

        const metaLine = metaParts.length
          ? `<span class="event-meta">${metaParts.join(" ")}</span>`
          : "";

        // Show year inline with date range for multi-year entries
        const year = getYear(event);
        const yearDisplay = event.date_display || (year ? String(year) : "");
        const yearPrefix = yearDisplay
          ? `<span class="event-year">${escapeHtml(yearDisplay)}</span> \u203A `
          : "";

        return `<div class="event">
          <div class="event-head">${yearPrefix}<b>${org} \u2192</b> ${title}</div>
          ${description}
          ${metaLine}
        </div>`;
      }

      (async function renderCV() {
        const container = document.getElementById("cv-container");
        container.innerHTML = '<p class="caption">Loading events...</p>';

        const { data, error } = await _supabase
          .schema("oulipo_dashboard")
          .from("events")
          .select("*")
          .order("date", { ascending: false });

        if (error) {
          console.error("Supabase error:", error);
          container.innerHTML = '<p class="caption">Could not load events.</p>';
          return;
        }

        // Group by section (kind)
        const kindMap = {};
        data.forEach((e) => {
          const k = e.kind || "_uncategorized";
          if (!kindMap[k]) kindMap[k] = [];
          kindMap[k].push(e);
        });

        let html = "";
        CV_SECTIONS.forEach((section) => {
          // Collect all events for this section's kinds
          const events = [];
          section.kinds.forEach((k) => {
            if (kindMap[k]) events.push(...kindMap[k]);
          });
          if (events.length === 0) return;

          // Sort by date descending within section
          events.sort((a, b) => new Date(b.date) - new Date(a.date));

          html += `<div class="cv-section">`;
          html += `<div class="section-heading">${section.label}</div>`;
          html += "<hr>";
          html += events.map((e) => renderCvEvent(e)).join("\n<hr>\n");
          html += `</div>`;
        });

        // Uncategorized events (kind = null)
        if (kindMap["_uncategorized"] && kindMap["_uncategorized"].length > 0) {
          html += `<div class="cv-section">`;
          html += `<div class="section-heading">Other</div>`;
          html += "<hr>";
          html += kindMap["_uncategorized"]
            .map((e) => renderCvEvent(e))
            .join("\n<hr>\n");
          html += `</div>`;
        }

        container.innerHTML = html;
      })();
    </script>
  </body>
</html>
