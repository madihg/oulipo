<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV — oulipo.xyz</title>
    <meta
      name="description"
      content="Events, performances, workshops, and keynotes by Halim Madi."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>◉</text></svg>"
    />
    <link rel="stylesheet" href="../Assets/css/shared.css" />

    <style>
      /* CV page-specific styles */

      :root {
        --content-width: 54rem;
      }

      .page {
        min-height: 100vh;
        padding: 0;
      }

      .page-layout {
        padding: 0 4rem 2rem;
        margin-top: 3.5rem;
        max-width: var(--content-width);
        display: flex;
        flex-direction: column;
      }

      .page-content {
        align-items: flex-start;
        text-align: left;
        padding: 0;
        background-color: #ffffff;
        width: 100%;
      }

      /* Title area */
      .page-title {
        text-align: left;
        margin-bottom: 0.6rem;
        font-family: Standard, sans-serif;
        font-size: 1.8rem;
        font-weight: 700;
        line-height: 1.08;
      }

      /* Section heading - Diatype Variable per brand guidelines */
      .section-heading {
        font-family: "Diatype Variable", sans-serif;
        font-size: 1.12rem;
        font-weight: 700;
        margin: 1.15rem 0 0.35rem 0;
        color: rgba(0, 0, 0, 0.85);
      }

      .section-heading:first-of-type {
        margin-top: 0.4rem;
      }

      /* Year prefix inline */
      .event-year {
        font-family: "Diatype Mono Variable", monospace;
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        color: rgba(0, 0, 0, 0.6);
      }

      /* Event entry */
      .event {
        margin: 0;
      }

      .event-head {
        font-size: var(--type-size-base);
        line-height: 1.12;
      }

      .event-head b {
        font-weight: 700;
      }

      .event-description,
      .event-meta {
        display: block;
        font-family: "Diatype Mono Variable", monospace;
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        color: #000000;
        line-height: 1.14;
        letter-spacing: 0em;
      }

      .event-description {
        font-size: var(--type-size-caption);
      }

      .event-meta {
        font-size: var(--type-size-meta);
      }

      .event-meta a {
        color: #000000;
        text-decoration: underline;
        text-underline-offset: 0.08em;
      }

      /* Multi-column layout for CV sections */
      #cv-container {
        columns: 2;
        column-gap: 2rem;
      }

      .cv-section {
        break-inside: avoid;
        margin-bottom: 0.5rem;
      }

      /* 3 columns on wider screens */
      @media (min-width: 1200px) {
        :root {
          --content-width: 72rem;
        }

        #cv-container {
          columns: 3;
        }
      }

      /* 4 columns on very wide screens */
      @media (min-width: 1600px) {
        :root {
          --content-width: 92rem;
        }

        #cv-container {
          columns: 4;
        }
      }

      /* Responsive */
      @media (max-width: 900px) {
        .page-layout {
          width: min(100%, 34rem);
          max-width: 34rem;
          margin-top: 1.4rem;
          padding: 1.4rem 1.4rem 1.6rem;
        }

        #cv-container {
          columns: 1;
        }
      }

      @media (max-width: 600px) {
        .page-layout {
          width: 100%;
          max-width: none;
          margin-top: 2.5rem;
          padding: 0.95rem 1.5rem 1.4rem;
        }

        .page-title {
          font-size: 1.4rem;
        }
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  </head>
  <body>
    <!-- Site Header -->
    <div class="site-header">
      <a href="/home/">Halim Madi</a>
    </div>

    <!-- Menu Toggle Button -->
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Open menu">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Menu Overlay -->
    <div class="menu-overlay" onclick="toggleMenu()"></div>

    <!-- Side Menu Drawer -->
    <nav class="side-menu">
      <div class="menu-header">
        <a href="/home/" class="menu-home">Home</a>
        <button
          class="menu-close"
          onclick="toggleMenu()"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>

      <div class="menu-section">
        <a href="/works/">Works</a>
        <a href="/keynotes/">Keynotes</a>
        <a href="/workshops/">Workshops</a>
        <a href="/books/">Books</a>
      </div>

      <hr class="menu-divider" />

      <div class="menu-section">
        <a href="/about/">About</a>
        <a href="/connect/">Connect</a>
        <a
          href="https://halimmadi.substack.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Newsletter <span class="external-arrow">&#x2197;</span></a
        >
        <a
          href="https://www.instagram.com/yalla_halim"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram <span class="external-arrow">&#x2197;</span></a
        >
      </div>
    </nav>

    <div class="page">
      <div class="page-layout">
        <div class="page-content">
          <h1 class="page-title">CV</h1>

          <div id="cv-container"></div>
        </div>
      </div>
    </div>

    <script src="../Assets/js/menu.js"></script>
    <script>
      // ── Supabase Config ──
      const SUPABASE_URL = "https://smytgqkgomsfyurskpcl.supabase.co";
      const SUPABASE_ANON_KEY =
        "sb_publishable_m509hZmnUb8NZRG94irXqA_AViI-8qf";
      const _supabase = window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_ANON_KEY,
      );

      function formatKind(kind) {
        if (!kind) return "";
        return kind
          .split("_")
          .map((w) => w.charAt(0).toUpperCase() + w.slice(1))
          .join(" ");
      }

      function escapeHtml(value) {
        const str = String(value ?? "");
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function parseEventDate(value) {
        if (!value) return null;
        const dt = new Date(value);
        return Number.isNaN(dt.getTime()) ? null : dt;
      }

      function parseYearFromDisplay(dateDisplay) {
        const match = String(dateDisplay ?? "").match(/\b(19|20)\d{2}\b/);
        return match ? Number(match[0]) : null;
      }

      function safeExternalUrl(value) {
        if (!value) return null;
        try {
          const url = new URL(value, window.location.origin);
          if (url.protocol !== "http:" && url.protocol !== "https:") {
            return null;
          }
          return url.toString();
        } catch {
          return null;
        }
      }

      // Section definitions: label → array of kind values
      const CV_SECTIONS = [
        { label: "Exhibitions", kinds: ["exhibition"] },
        { label: "Residencies", kinds: ["residency"] },
        { label: "Fellowships", kinds: ["fellowship"] },
        { label: "Awards", kinds: ["award"] },
        { label: "Talks", kinds: ["keynote", "panel", "talk"] },
        { label: "Performances", kinds: ["performance"] },
        { label: "Workshops", kinds: ["workshop"] },
        { label: "Press", kinds: ["press"] },
        { label: "Books", kinds: ["book"] },
        { label: "Publications", kinds: ["publication"] },
        { label: "Art Writing", kinds: ["art_writing"] },
        { label: "Professional", kinds: ["professional_experience"] },
        { label: "Education", kinds: ["education"] },
      ];

      function buildMetaLine(event) {
        // In section view, skip the kind (it's redundant with the heading)
        const whereWhen = [event.location, event.date_display]
          .map((v) => String(v || "").trim())
          .filter(Boolean)
          .join(", ");
        if (!whereWhen) return "";
        return whereWhen.endsWith(".") ? whereWhen : `${whereWhen}.`;
      }

      function getYear(event) {
        const dt = parseEventDate(event.date) || parseEventDate(event.date_end);
        if (dt) return dt.getFullYear();
        return parseYearFromDisplay(event.date_display);
      }

      function renderCvEvent(event) {
        const linkUrl = safeExternalUrl(event.link);
        const org = escapeHtml(event.org);
        const title = escapeHtml(event.title);
        const description = event.description
          ? `<span class="event-description">${escapeHtml(event.description)}</span>`
          : "";
        const metaText = escapeHtml(buildMetaLine(event));
        const linkTag = linkUrl
          ? `<a href="${escapeHtml(linkUrl)}" target="_blank" rel="noopener noreferrer">Link <span class="external-arrow">&#x2197;</span></a>`
          : "";
        const metaParts = [];

        if (metaText) {
          metaParts.push(metaText);
        }
        if (linkTag) {
          metaParts.push(linkTag);
        }

        const metaLine = metaParts.length
          ? `<span class="event-meta">${metaParts.join(" ")}</span>`
          : "";

        // Show year inline with date range for multi-year entries
        const year = getYear(event);
        const yearDisplay = event.date_display || (year ? String(year) : "");
        const yearPrefix = yearDisplay
          ? `<span class="event-year">${escapeHtml(yearDisplay)}</span> \u203A `
          : "";

        return `<div class="event">
          <div class="event-head">${yearPrefix}<b>${org} \u2192</b> ${title}</div>
          ${description}
          ${metaLine}
        </div>`;
      }

      (async function renderCV() {
        const container = document.getElementById("cv-container");
        container.innerHTML = '<p class="caption">Loading events...</p>';

        const { data, error } = await _supabase
          .schema("oulipo_dashboard")
          .from("events")
          .select("*")
          .order("date", { ascending: false });

        if (error) {
          console.error("Supabase error:", error);
          container.innerHTML = '<p class="caption">Could not load events.</p>';
          return;
        }

        // Group by section (kind)
        const kindMap = {};
        data.forEach((e) => {
          const k = e.kind || "_uncategorized";
          if (!kindMap[k]) kindMap[k] = [];
          kindMap[k].push(e);
        });

        let html = "";
        CV_SECTIONS.forEach((section) => {
          // Collect all events for this section's kinds
          const events = [];
          section.kinds.forEach((k) => {
            if (kindMap[k]) events.push(...kindMap[k]);
          });
          if (events.length === 0) return;

          // Sort by date descending within section
          events.sort((a, b) => new Date(b.date) - new Date(a.date));

          html += `<div class="cv-section">`;
          html += `<div class="section-heading">${section.label}</div>`;
          html += "<hr>";
          html += events.map((e) => renderCvEvent(e)).join("\n<hr>\n");
          html += `</div>`;
        });

        // Uncategorized events (kind = null)
        if (kindMap["_uncategorized"] && kindMap["_uncategorized"].length > 0) {
          html += `<div class="cv-section">`;
          html += `<div class="section-heading">Other</div>`;
          html += "<hr>";
          html += kindMap["_uncategorized"]
            .map((e) => renderCvEvent(e))
            .join("\n<hr>\n");
          html += `</div>`;
        }

        container.innerHTML = html;
      })();
    </script>
  </body>
</html>
