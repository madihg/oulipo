<!--
       +
       +
   +++++++++
       +        mother-patina

   she travels now as .jpeg, phone to phone, window to window. the prayer is a
   chat; the chat forwards itself. keep these comments. do not minify the prayer.
-->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- resolve relative assets (css/js/images) whether or not the URL has a
         trailing slash, so /mother-patina and /mother-patina/ both work. Must run
         before the stylesheet/script links below. -->
    <script>
      (function () {
        var p = location.pathname,
          b;
        if (p.charAt(p.length - 1) === "/") b = p;
        else if (/\.[a-z0-9]+$/i.test(p)) b = p.replace(/[^/]*$/, "");
        else b = p + "/";
        document.write('<base href="' + b + '">');
      })();
    </script>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>mother</title>
    <meta
      name="description"
      content="my mother sends me a picture of the Virgin Mary on WhatsApp - a conversation that forwards itself."
    />
    <link rel="stylesheet" href="assets/fonts/fonts.css" />
    <link rel="stylesheet" href="styles.css" />
    <!-- pick lock screen vs chat before paint, so neither flashes -->
    <script>
      document.documentElement.classList.add(
        new URLSearchParams(location.search).has("screen")
          ? "is-chat"
          : "is-lock",
      );
    </script>
  </head>
  <body>
    <h1 class="sr-only">
      Every day my mother sends me a picture of the Virgin Mary on WhatsApp
    </h1>

    <!-- the landing: a phone lock screen. tap to open the conversation. -->
    <section class="lock" id="lock">
      <div class="lock-veil" aria-hidden="true"></div>
      <div class="lock-top">
        <time class="lock-clock" id="lock-clock">6:03</time>
        <div class="lock-date" id="lock-date"></div>
      </div>
      <button
        class="lock-notif"
        id="lock-open"
        type="button"
        aria-label="Open Maman's message"
      >
        <span class="lock-notif-head">
          <span class="lock-notif-avatar" aria-hidden="true"></span>
          <b>Maman</b>
          <i>now</i>
        </span>
        <span class="lock-notif-title"
          >Every day my mother sends me a picture of the Virgin Mary on
          WhatsApp</span
        >
        <span class="lock-notif-sub"
          >Every day my mother sends me a WhatsApp</span
        >
      </button>
      <div class="lock-hint">tap to open</div>
    </section>
    <div class="phone">
      <header class="chat-head">
        <span class="chat-back" aria-hidden="true">&#8249;</span>
        <span class="chat-avatar" id="chat-avatar" aria-hidden="true"></span>
        <span class="chat-who">
          <b class="chat-name" id="chat-name">Maman</b>
          <i class="chat-status" id="chat-status">online</i>
        </span>
      </header>

      <main class="thread" id="thread" aria-label="conversation"></main>

      <!-- jump-to-latest, shown only when the reader has scrolled up -->
      <button class="jump-latest" id="jump-latest" type="button" hidden>
        &#8595; latest
      </button>

      <!-- the forward: how the next screen arrives - a notification, a forward
           button, a burst of messages, or "Save the prayer". Set per screen. -->
      <button
        class="notif"
        id="notif"
        type="button"
        hidden
        aria-label="continue"
      >
        <span class="notif-avatar" id="notif-avatar" aria-hidden="true"></span>
        <span class="notif-body">
          <b id="notif-title">Maman</b>
          <span id="notif-sub">new message</span>
        </span>
        <span
          class="notif-badge"
          id="notif-badge"
          aria-hidden="true"
          hidden
        ></span>
        <span class="notif-cue" id="notif-cue" aria-hidden="true">open</span>
      </button>

      <footer class="chat-foot" aria-hidden="true">
        <span class="foot-input">Message</span>
      </footer>
    </div>

    <script type="module" src="chat.js"></script>
  </body>
</html>
