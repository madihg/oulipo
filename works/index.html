<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Works — Halim Madi</title>
    <meta
      name="description"
      content="Poems, performances, software, and small interventions by Halim Madi — exploring what language remembers."
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>&#x25C9;</text></svg>"
    />
    <link rel="stylesheet" href="../Assets/css/shared.css?v=34" />
    <style>
      .works-page {
        max-width: 1280px;
      }
      .works-eyebrow {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ink-50);
        margin: 0 0 0.75rem;
      }
      .works-intro {
        max-width: 56ch;
        margin-bottom: 2rem;
      }
      .works-intro p {
        line-height: 1.5;
      }
      .works-intro p:not(.works-eyebrow) {
        font-size: 1.2rem;
        line-height: 1.4;
        color: var(--ink-85);
      }

      /* Layout: works list (1fr) + filter rail (160px) on desktop */
      .works-layout {
        display: grid;
        grid-template-columns: 1fr 160px;
        gap: 3rem;
        align-items: start;
      }
      @media (max-width: 900px) {
        .works-layout {
          grid-template-columns: 1fr;
          gap: 1.5rem;
        }
      }

      /* Filter rail (right column, desktop only) */
      .works-filter-rail {
        position: sticky;
        top: calc(var(--signup-bar-h) + 1.5rem);
        border-left: 1px solid var(--ink-15);
        padding-left: 1rem;
      }
      .works-filter-rail__title {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--ink-50);
        margin-bottom: 0.6rem;
      }
      .works-filter-btn {
        display: flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.25rem 0;
        background: transparent;
        border: 0;
        cursor: pointer;
        font-family: var(--font-body);
        font-size: var(--type-size-caption);
        color: var(--ink-85);
        text-align: left;
        width: 100%;
      }
      .works-filter-btn[aria-pressed="true"] {
        font-weight: 700;
      }
      .works-filter-btn .swatch {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--section-color, var(--ink-50));
        flex-shrink: 0;
      }
      .works-filter-btn .check {
        width: 0.6rem;
        height: 0.6rem;
        border: 1px solid var(--ink);
        flex-shrink: 0;
      }
      .works-filter-btn[aria-pressed="true"] .check {
        background: var(--ink);
      }

      /* Mobile filter chips strip (visible <=900px) */
      .works-filter-chips {
        display: none;
        gap: 0.4rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }
      @media (max-width: 900px) {
        .works-filter-chips {
          display: flex;
        }
        .works-filter-rail {
          display: none;
        }
      }
      .works-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.2rem 0.55rem;
        border: 1.2px solid var(--section-color, var(--ink));
        border-radius: 999px;
        font-family: var(--font-mono);
        font-size: 0.78rem;
        letter-spacing: 0.03em;
        text-transform: lowercase;
        color: var(--ink-85);
        background: transparent;
        cursor: pointer;
      }
      .works-chip[aria-pressed="true"] {
        background: var(--ink);
        color: var(--paper);
        border-color: var(--ink);
      }
      .works-chip .swatch {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--section-color, var(--ink));
        flex-shrink: 0;
      }
      .works-chip[aria-pressed="true"] .swatch {
        background: var(--paper);
      }

      /* Year group heading — neutral hairline, no section color. */
      .works-year {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: 0.85rem;
        letter-spacing: 0.05em;
        text-transform: uppercase;
        color: var(--ink-50);
        margin: 2.5rem 0 0.75rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--ink-15);
      }
      .works-year:first-child {
        margin-top: 0;
      }

      /* Card */
      .work-card {
        display: block;
        text-decoration: none;
        color: inherit;
        margin-bottom: 4rem;
      }
      .work-card:last-child {
        margin-bottom: 0;
      }
      .work-card__split {
        display: grid;
        grid-template-columns: 5fr 7fr;
        gap: 2rem;
        align-items: start;
      }
      @media (max-width: 900px) {
        .work-card {
          margin-bottom: 2.5rem;
        }
        .work-card__split {
          grid-template-columns: 1fr;
          gap: 1rem;
        }
        /* image first on mobile */
        .work-card__image {
          order: -1;
        }
      }

      .work-card__image {
        position: relative;
        aspect-ratio: 16 / 9;
        overflow: hidden;
        background: var(--ink-08);
      }
      .work-card__image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .work-card__image.is-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-40);
        font-family: var(--font-mono);
        font-size: var(--type-size-meta);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      /* .work-card__venue removed 2026-05-22 — venue text now lives inline
         in .work-card__meta beside year and location. */
      .work-card__title {
        font-family: var(--font-h2);
        font-weight: 700;
        font-size: clamp(1.1rem, 1.6vw, 1.4rem);
        line-height: 1.15;
        color: var(--ink-85);
        margin: 0 0 0.5rem;
      }
      .work-card:hover .work-card__title {
        text-decoration: underline 1px var(--ink-85);
        text-underline-offset: 0.12em;
      }
      .work-card__meta {
        font-family: var(--font-body);
        font-size: var(--type-size-caption);
        color: var(--ink-70);
        margin-bottom: 0.5rem;
      }
      .work-card__meta .sep {
        color: var(--ink-40);
        margin: 0 0.4rem;
      }
      .work-card__desc {
        font-family: var(--font-body);
        font-size: 1rem;
        line-height: 1.4;
        color: var(--ink-85);
        margin: 0 0 0.75rem;
      }
      .work-card__footer {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-top: 0.5rem;
      }
      .work-card__footer-spacer {
        color: var(--ink-40);
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
      }
      .work-card__dot {
        display: none;
      }

      /* ── Series view (Halim 2026-05-22) ───────────────────────
         The View=series toggle replaces the year grid with a stack of
         large series banners (Singulars, New Beirut, oulipo.xyz). Each
         banner mirrors the .home-feature 5/7 split. Clicking the banner
         expands an inline list of that series' pieces (rendered with the
         existing .work-card markup) so the visual rhythm stays consistent
         across both views. */
      /* Halim 2026-05-22: series view restyled to mirror the landing-
         page Featured/Upcoming/Recent sections. Each series is a flat
         block — header (title + count) → description paragraph → a grid
         of home-feature-style piece cards. No click-to-expand. */
      .work-series {
        margin-bottom: 4rem;
      }
      .work-series:last-child {
        margin-bottom: 0;
      }
      .work-series__head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 0.5rem;
        padding-bottom: 0.4rem;
        border-bottom: 1px solid var(--ink-15);
      }
      .work-series__title {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: 0.95rem;
        font-weight: 400;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--ink-50);
        margin: 0;
      }
      .work-series__count {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: 0.85rem;
        color: var(--ink-50);
        margin: 0;
      }
      .work-series__desc {
        font-family: var(--font-body);
        font-size: 1.05rem;
        line-height: 1.45;
        color: var(--ink-85);
        margin: 0 0 1.5rem;
        max-width: 60ch;
      }
      .work-series__pieces {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem 1.5rem;
      }
      @media (max-width: 900px) {
        .work-series__pieces {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 600px) {
        .work-series__pieces {
          grid-template-columns: 1fr;
        }
      }

      /* Home-feature-shaped card */
      .work-series-card {
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
        text-decoration: none;
        color: inherit;
      }
      .work-series-card__image {
        aspect-ratio: 4 / 3;
        background: var(--ink-08);
        overflow: hidden;
      }
      .work-series-card__image img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .work-series-card__image.is-empty {
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink-40);
        font-family: var(--font-mono);
        font-size: var(--type-size-meta);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .work-series-card__body {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
      }
      .work-series-card__footer {
        margin-top: 0.4rem;
        display: flex;
        align-items: center;
      }
      .work-series-card__kind {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ink-50);
        margin: 0;
      }
      .work-series-card__title {
        font-family: var(--font-h2);
        font-weight: 700;
        font-size: 1.15rem;
        line-height: 1.15;
        color: var(--ink-85);
        margin: 0;
      }
      .work-series-card:hover .work-series-card__title {
        text-decoration: underline 1px var(--ink-85);
        text-underline-offset: 0.12em;
      }
      .work-series-card__meta {
        font-family: var(--font-body);
        font-size: var(--type-size-caption);
        color: var(--ink-70);
        margin: 0;
      }
      .work-series-card__meta .sep {
        color: var(--ink-40);
        margin: 0 0.35rem;
      }

      /* Skeleton + empty + error states */
      .works-state {
        font-family: var(--font-mono);
        font-variation-settings:
          "slnt" 0,
          "MONO" 1;
        font-size: var(--type-size-meta);
        color: var(--ink-50);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 1rem 0;
      }
      .works-skeleton {
        display: grid;
        grid-template-columns: 5fr 7fr;
        gap: 2rem;
        margin-bottom: 4rem;
      }
      .works-skeleton__bar {
        height: 1rem;
        background: var(--ink-08);
        margin: 0.4rem 0;
        max-width: 80%;
      }
      .works-skeleton__bar.short {
        max-width: 40%;
      }
      .works-skeleton__bar.tall {
        height: 2.4rem;
        max-width: 60%;
      }
      .works-skeleton__image {
        aspect-ratio: 16 / 9;
        background: var(--ink-08);
      }
      @media (max-width: 900px) {
        .works-skeleton {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="menu-overlay" onclick="toggleMenu()"></div>

    <nav class="side-menu">
      <div class="menu-header">
        <a href="/" class="menu-home">Home</a>
        <button
          class="menu-close"
          onclick="toggleMenu()"
          aria-label="Close menu"
        >
          &times;
        </button>
      </div>
      <div class="menu-section">
        <a href="/works/">Works</a>
        <a href="/engagements/">Engagements</a>
        <a href="/writing/">Writing</a>
      </div>
      <hr class="menu-divider" />
      <div class="menu-section">
        <a href="/about/">About</a>
        <a href="/connect/">Connect</a>
        <a
          href="https://halimmadi.substack.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          Newsletter <span class="external-arrow">&#x2197;</span></a
        >
        <a
          href="https://www.instagram.com/yalla_halim"
          target="_blank"
          rel="noopener noreferrer"
        >
          Instagram <span class="external-arrow">&#x2197;</span></a
        >
      </div>
    </nav>

    <div class="page">
      <div class="page-content works-page">
        <h1 class="visually-hidden">Works</h1>
        <div class="works-intro">
          <p class="works-eyebrow">Works · 2018 — present</p>
          <p>
            Poems, performances, software, and small interventions. The work
            lives between code and care. It glitches. Sometimes, it shows its
            teeth. Filter by tribe.
          </p>
        </div>

        <!-- Mobile-only filter chips -->
        <div
          class="works-filter-chips"
          role="tablist"
          aria-label="Filter works by section"
          data-works-filter-mobile
        ></div>

        <div class="works-layout">
          <!-- Works list (hydrated by JS) -->
          <div data-works-list>
            <!-- Initial skeleton -->
            <div class="works-skeleton" aria-hidden="true">
              <div>
                <div class="works-skeleton__bar short"></div>
                <div class="works-skeleton__bar tall"></div>
                <div class="works-skeleton__bar"></div>
                <div class="works-skeleton__bar"></div>
              </div>
              <div class="works-skeleton__image"></div>
            </div>
            <div class="works-skeleton" aria-hidden="true">
              <div>
                <div class="works-skeleton__bar short"></div>
                <div class="works-skeleton__bar tall"></div>
                <div class="works-skeleton__bar"></div>
              </div>
              <div class="works-skeleton__image"></div>
            </div>
            <div class="works-state" data-works-status>Loading works…</div>
          </div>

          <!-- Filter rail (desktop only) -->
          <aside
            class="works-filter-rail"
            role="tablist"
            aria-label="Filter works by section"
            data-works-filter-rail
          ></aside>
        </div>
      </div>
    </div>

    <script src="../Assets/js/menu.js"></script>
    <script src="/Assets/js/chrome.js?v=24" defer></script>
    <script src="/Assets/js/works-page.js?v=11" defer></script>
  </body>
</html>
